<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes commandes - Ranita</title>
    <link rel="stylesheet" href="products.css">
    <link rel="stylesheet" href="header.css">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">


    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa;
        }

        .site-header {
            background: #111827;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-logo {
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            color: white;
        }

        .site-header nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .orders-page {
            max-width: 800px;
            margin: 32px auto;
            padding: 0 20px;
        }

            .orders-page h1 {
                font-size: 24px;
                font-weight: 800;
                margin-bottom: 8px;
            }

            .orders-page p {
                font-size: 14px;
                color: #6b7280;
                margin-bottom: 24px;
            }

        .order-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

            .order-card:hover {
                box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            }

        .order-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-id {
            font-size: 16px;
            font-weight: 800;
            color: #111827;
        }

        .order-date {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-en-attente {
            background: #fef3c7;
            color: #92400e;
        }

        .status-validee {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-livree {
            background: #d1fae5;
            color: #065f46;
        }

        .status-annulee {
            background: #fee2e2;
            color: #991b1b;
        }

        .order-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #6b7280;
        }

        .order-total {
            font-size: 16px;
            font-weight: 800;
            color: #111827;
        }

        .order-items-preview {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

            .order-items-preview img {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 8px;
                border: 2px solid #f3f4f6;
            }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

            .modal-overlay.open {
                display: flex;
            }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 28px;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

            .modal h3 {
                font-size: 18px;
                font-weight: 800;
                margin-bottom: 6px;
            }

        .modal-date {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 16px;
        }

        .modal-info {
            background: #f9fafb;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #374151;
            line-height: 1.8;
        }

        .modal-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }

            .modal-item:last-child {
                border-bottom: none;
            }

            .modal-item img {
                width: 60px;
                height: 60px;
                object-fit: cover;
                border-radius: 10px;
                flex-shrink: 0;
            }

        .modal-item-info {
            flex: 1;
        }

        .modal-item-name {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 2px;
        }

        .modal-item-qty {
            font-size: 12px;
            color: #6b7280;
        }

        .modal-item-price {
            font-size: 14px;
            font-weight: 700;
            color: #10b981;
            white-space: nowrap;
        }

        .modal-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 8px 0;
            color: #6b7280;
        }

            .modal-total-row.grand {
                font-size: 18px;
                font-weight: 800;
                color: #111827;
                border-top: 2px solid #f3f4f6;
                margin-top: 8px;
                padding-top: 12px;
            }

                .modal-total-row.grand span:last-child {
                    color: #10b981;
                }

        .btn-close {
            width: 100%;
            background: #f3f4f6;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 14px;
        }

            .empty-state p {
                color: #9ca3af;
                margin: 12px 0 24px;
            }

        .btn-shop {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
        }

        @media(max-width: 768px) {
            .site-header {
                display: none !important;
            }

            #mobHeaderOrders {
                display: flex !important;
            }

            .orders-page {
                padding-top: 76px !important;
            }
        }


        @media(max-width:768px) {
            #scrollTopBtn {
                right: auto !important;
                left: 16px !important;
                bottom: 80px !important;
            }
        }

        @media(min-width:769px) {
            #scrollTopBtn {
                right: 16px !important;
                bottom: 32px !important;
            }
        }
    </style>
</head>
<body>

    <header class="site-header" style="position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(13,17,23,.97);height:58px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);">
        <div class="site-logo" onclick="location.href='index.html'" style="font-size:17px;font-weight:800;color:#F0F6FC;cursor:pointer;">🛒 Ranita<span style="color:#10b981;">Market</span></div>
        <nav style="display:flex;align-items:center;gap:16px;">
            <a href="products.html" style="color:#8B949E;text-decoration:none;font-size:13px;font-weight:500;">Produits</a>
            <a href="cart.html" style="color:#8B949E;text-decoration:none;font-size:13px;font-weight:500;">Panier</a>
            <div id="authNav" style="display:inline-flex;align-items:center;"></div>
        </nav>
    </header>




    <div class="orders-page" style="padding-top: 80px;">
        <h1>📦 Mes commandes</h1>
        <p>Historique de vos commandes Ranita Market</p>
        <div id="ordersContainer"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        const API_BASE = "https://ranitaapi-production.up.railway.app/api";
        const client = JSON.parse(localStorage.getItem("client"));

        if (!client) {
            window.location.href = "login.html?redirect=client-orders.html";
        }


        async function requestRefund(orderId) {
            const motif = document.getElementById(`refundMotif_${orderId}`).value.trim();
            if (!motif) { alert("Veuillez indiquer un motif."); return; }

            const res = await fetch(`${API_BASE}/orders/${orderId}/refund-request`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem('token')
                },
                body: JSON.stringify({ motif })
            });

            if (!res.ok) { alert(await res.text()); return; }

            alert("✅ Demande de remboursement envoyée !");
            document.getElementById("modalOverlay").classList.remove("open");
            loadOrders();
        }


        function getStatusClass(status) {
            switch (status) {
                case "En attente": return "status-en-attente";
                case "Validée": return "status-validee";
                case "Livrée": return "status-livree";
                case "Annulée": return "status-annulee";
                default: return "status-en-attente";
            }
        }


        async function cancelOrder(orderId) {
            if (!confirm("Voulez-vous vraiment annuler cette commande ?")) return;

            const res = await fetch(`${API_BASE}/orders/${orderId}/cancel`, {
                method: "POST"
            });

            if (!res.ok) {
                alert(await res.text());
                return;
            }

            alert("Commande annulée avec succès.");
            document.getElementById("modalOverlay").classList.remove("open");
            loadOrders();
        }


        async function loadOrders() {
            const container = document.getElementById("ordersContainer");

            const res = await fetch(`${API_BASE}/client-auth/orders/${client.id}`, {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            if (!res.ok) {
                container.innerHTML = "<p>Impossible de charger vos commandes.</p>";
                return;
            }

            const orders = await res.json();

            if (orders.length === 0) {
                container.innerHTML = `
                                            <div class="empty-state">
                                                <div style="font-size:60px">📦</div>
                                                <p>Vous n'avez pas encore passé de commande.</p>
                                                <a href="products.html" class="btn-shop">Découvrir les produits</a>
                                            </div>`;
                return;
            }

            container.innerHTML = orders.map(o => `
                                        <div class="order-card" onclick="showDetails(${o.id})">
                                            <div class="order-head">
                                                <div>
                                                    <div class="order-id">Commande #${o.id}</div>
                                                    <div class="order-date">${new Date(o.createdAt).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
                                                </div>
                                                <span class="order-status ${getStatusClass(o.status)}">${o.status}</span>
                                            </div>
                                            <div class="order-items-preview">
                                                ${o.items.map(i => `
                                                    <img src="${i.imageUrl || 'https://via.placeholder.com/50'}" alt="${i.productName}" title="${i.productName}">
                                                `).join('')}
                                            </div>
                                            <div class="order-summary">
                                                <span>${o.items.length} article(s) • ${o.paymentMethod}</span>
                                                <span class="order-total">${Number(o.total).toLocaleString()} FCFA</span>
                                            </div>
                                        </div>
                                    `).join('');

            // Stocker les commandes pour la modal
            window._orders = orders;
        }



        function showDetails(orderId) {
            const o = window._orders.find(o => o.id === orderId);
            if (!o) return;

            const subtotal = o.items.reduce((s, i) => s + i.price * i.quantity, 0);
            const shipping = o.shippingFee ?? 0;  // ?? au lieu de ||
            const referralDiscount = o.referralCreditUsed ?? 0;
            const promoDiscount = o.promoDiscount ?? 0;

            // Affichage livraison — même logique que le checkout
            const shippingLabel = shipping === 0
                ? '🎉 Gratuite !'
                : Number(shipping).toLocaleString() + ' FCFA';

            document.getElementById("modalContent").innerHTML = `
                                        <h3>Commande #${o.id}</h3>
                                        <div class="modal-date">${new Date(o.createdAt).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>

                                        <div class="modal-info">
                                            <strong>Statut :</strong> ${o.status}<br>
                                            <strong>Livraison :</strong> ${o.customerAddress}<br>
                                            <strong>Paiement :</strong> ${o.paymentMethod}
                                        </div>

                                        <div style="margin-bottom:8px;font-size:13px;font-weight:700;color:#374151;">Articles commandés</div>

                                        ${o.items.map(i => `
                                            <div class="modal-item">
                                                <img src="${i.imageUrl || 'https://via.placeholder.com/60'}" alt="${i.productName}">
                                                <div class="modal-item-info">
                                                    <div class="modal-item-name">${i.productName}</div>
                                                    <div class="modal-item-qty">Quantité : ${i.quantity} × ${Number(i.price).toLocaleString()} FCFA</div>
                                                </div>
                                                <div class="modal-item-price">${Number(i.price * i.quantity).toLocaleString()} FCFA</div>
                                            </div>
                                        `).join('')}

                                        <div class="modal-total-row">
                                            <span>Sous-total</span>
                                            <span>${Number(subtotal).toLocaleString()} FCFA</span>
                                        </div>
<div class="modal-total-row">
                        <span>🚚 Livraison</span>
                        <span>${shippingLabel}</span>
</div>
${referralDiscount > 0 ? `
<div class="modal-total-row" style="color:#10b981;font-weight:700;">
                        <span>🎁 Crédit parrainage</span>
                        <span>- ${Number(referralDiscount).toLocaleString()} FCFA</span>
</div>` : ''}
${promoDiscount > 0 ? `
<div class="modal-total-row" style="color:#10b981;font-weight:700;">
                        <span>🎟️ Code promo${o.promoCode ? ' (' + o.promoCode + ')' : ''}</span>
                        <span>- ${Number(promoDiscount).toLocaleString()} FCFA</span>
</div>` : ''}
                                        <div class="modal-total-row grand">
                                            <span>Total</span>
                                            <span>${Number(o.total).toLocaleString()} FCFA</span>
                                        </div>

${o.status === "En attente" ? `
                        <button onclick="cancelOrder(${o.id})"
                                style="width:100%;background:#fef2f2;color:#ef4444;border:2px solid #ef4444;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;margin-top:12px;font-size:14px;">
                            ❌ Annuler la commande
                        </button>
` : ''}
${o.status === "Livrée" ? `
                        <div style="margin-top:12px;">
                            <textarea id="refundMotif_${o.id}" placeholder="Décrivez le motif de votre demande de remboursement..."
                                style="width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px;margin-bottom:8px;"></textarea>
                            <button onclick="requestRefund(${o.id})"
                                style="width:100%;background:#fef3c7;color:#92400e;border:2px solid #f59e0b;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;">
                                💰 Demander un remboursement
                            </button>
                        </div>
` : ''}

<button class="btn-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">
                        Fermer
</button>
                                    `;

            document.getElementById("modalOverlay").classList.add("open");
        }

        function closeModal(e) {
            if (e.target === document.getElementById("modalOverlay")) {
                document.getElementById("modalOverlay").classList.remove("open");
            }
        }

        function logoutClient() {
            localStorage.removeItem("client");
            window.location.href = "login.html";
        }

        loadOrders();
    </script>



    <nav style="display:none;position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(13,17,23,.97);height:56px;padding:0 14px;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);" id="mobHeaderOrders">
        <a href="index.html" style="font-size:15px;font-weight:800;color:#F0F6FC;text-decoration:none;flex:1;">🛒 Ranita<span style="color:#10b981;">Market</span></a>
        <a href="cart.html" style="color:#8B949E;padding:6px;display:flex;align-items:center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" /><line x1="3" y1="6" x2="21" y2="6" /></svg>
        </a>
        <a href="login.html" id="mobAuthIcon" style="color:#8B949E;padding:6px;display:flex;align-items:center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
        </a>
    </nav>

    <script>
        (function () {
            var client = JSON.parse(localStorage.getItem('client') || 'null');
            var nav = document.getElementById('authNav');
            if (!nav) return;

            if (client) {
                nav.innerHTML = '<button onclick="toggleMenu(event)" style="background:#10b981;color:#fff;border:none;padding:7px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;font-family:Arial,sans-serif;">👤 ' + (client.name ? client.name.split(' ')[0] : 'Mon compte') + ' ▾</button>';
                var cMenu = document.createElement('div');
                cMenu.id = 'cMenu';
                cMenu.style.cssText = 'display:none;position:fixed;top:64px;right:20px;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);min-width:200px;z-index:99999;';
                cMenu.innerHTML =
                    '<a href="profile.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;font-family:Arial,sans-serif;">👤 Mon profil</a>' +
                    '<a href="client-orders.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;font-family:Arial,sans-serif;">📦 Mes commandes</a>' +
                    '<a href="wishlist.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;font-family:Arial,sans-serif;">❤️ Mes favoris</a>' +
                    '<div onclick="doLogout()" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#ef4444;font-weight:600;cursor:pointer;font-size:13px;font-family:Arial,sans-serif;">🚪 Déconnexion</div>';
                document.body.appendChild(cMenu);
            } else {
                nav.innerHTML = '<a href="login.html" style="color:#10b981;font-weight:700;font-size:13px;text-decoration:none;">Connexion</a>';
            }

            window.toggleMenu = function (e) {
                if (e) e.stopPropagation();
                var m = document.getElementById('cMenu');
                if (m) m.style.display = m.style.display === 'none' ? 'block' : 'none';
            };
            window.doLogout = function () {
                localStorage.removeItem('client');
                localStorage.removeItem('token');
                location.href = 'index.html';
            };
            document.addEventListener('click', function (e) {
                var m = document.getElementById('cMenu');
                if (m && !e.target.closest('#authNav') && !e.target.closest('#cMenu')) m.style.display = 'none';
            });

            var mobAuth = document.getElementById('mobAuthIcon');
            if (mobAuth && client) {
                mobAuth.removeAttribute('href');
                mobAuth.style.cursor = 'pointer';
                mobAuth.innerHTML = '<div style="background:#10b981;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">' + (client.name ? client.name[0].toUpperCase() : '?') + '</div>';
                var mobMenu = document.createElement('div');
                mobMenu.style.cssText = 'display:none;position:fixed;top:60px;right:8px;background:white;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);min-width:180px;z-index:99999;';
                mobMenu.innerHTML =
                    '<a href="profile.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;">👤 Mon profil</a>' +
                    '<a href="client-orders.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;">📦 Mes commandes</a>' +
                    '<a href="wishlist.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;">❤️ Mes favoris</a>' +
                    '<div onclick="doLogout()" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#ef4444;font-weight:600;cursor:pointer;font-size:13px;">🚪 Déconnexion</div>';
                document.body.appendChild(mobMenu);
                mobAuth.addEventListener('click', function (e) {
                    e.stopPropagation();
                    mobMenu.style.display = mobMenu.style.display === 'none' ? 'block' : 'none';
                });
                document.addEventListener('click', function (e) {
                    if (!e.target.closest('#mobAuthIcon')) mobMenu.style.display = 'none';
                });
            }
        })();
    </script>




    <!-- ── BOUTON RETOUR EN HAUT ── -->
    <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none;opacity:0;position:fixed;bottom:80px;left:16px;width:36px;height:36px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);color:white;border:1px solid rgba(255,255,255,.2);border-radius:50%;font-size:18px;cursor:pointer;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.4);align-items:center;justify-content:center;transition:opacity .3s,transform .3s;">↑</button>
    <script>
        window.addEventListener('load', function () {
            var sb = document.getElementById('scrollTopBtn');
            if (!sb) return;
            window.addEventListener('scroll', function () {
                if (window.scrollY > 400) {
                    sb.style.display = 'flex';
                    setTimeout(function () { sb.style.opacity = '1'; sb.style.transform = 'scale(1)'; }, 10);
                } else {
                    sb.style.opacity = '0';
                    sb.style.transform = 'scale(.8)';
                    setTimeout(function () { if (window.scrollY <= 400) sb.style.display = 'none'; }, 300);
                }
            });
        });
    </script>


</body>
</html>
