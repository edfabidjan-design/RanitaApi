<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail produit - Ranita</title>
    <link rel="stylesheet" href="products.css">
</head>
<body>

    <header class="site-header">
        <div class="site-logo" onclick="location.href='index.html'">🛒 Ranita Market</div>
        <nav>
            <a href="products.html">Produits</a>
            <a href="cart.html">Panier</a>
        </nav>
    </header>

    <main class="product-details" id="productDetails"></main>


    <script>


        const API_BASE = "https://ranitaapi-production.up.railway.app/api";
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
            document.getElementById("productDetails").innerHTML = "<p>Produit invalide.</p>";
            throw new Error("ID manquant");
        }

        let currentProduct = null;
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        function escapeHtml(text) {
            return text
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;");
        }


        function showToast(msg) {
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerText = msg;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2500);
        }


        async function loadProduct() {
            const res = await fetch(`${API_BASE}/products/${id}`);

            if (!res.ok) {
                document.getElementById("productDetails").innerHTML = "<p>Produit introuvable.</p>";
                return;
            }

            currentProduct = await res.json();

            document.getElementById("productDetails").innerHTML = `
            <section class="product-detail-card">
                <img src="${currentProduct.imageUrl || 'https://via.placeholder.com/600x400?text=Ranita'}" alt="${currentProduct.name}">

                <div>
                    <h1>${currentProduct.name}</h1>
                    <p>${escapeHtml(currentProduct.description || "")}</p>

                    <h2>${Number(currentProduct.price).toLocaleString()} FCFA</h2>

                    <p><strong>Catégorie :</strong> ${currentProduct.category?.name || ""}</p>
                    <p><strong>Stock :</strong> ${currentProduct.stock}</p>

                    ${currentProduct.stock <= 0
                    ? `<button class="btn-disabled" disabled>Rupture de stock</button>`
                    : `<button class="btn-buy" onclick="addToCart()">Ajouter au panier</button>`
                }

                    <br><br>
                    <a href="products.html" class="secondary-link">Retour aux produits</a>
                </div>
            </section>
        `;
        }

        function addToCart() {
            if (!currentProduct || currentProduct.stock <= 0) {
                alert("Produit en rupture de stock.");
                return;
            }

            const existing = cart.find(p => p.id === currentProduct.id);

            if (existing) {
                existing.quantity++;
            } else {
                cart.push({
                    id: currentProduct.id,
                    name: currentProduct.name,
                    price: currentProduct.price,
                    imageUrl: currentProduct.imageUrl,
                    quantity: 1
                });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            showToast("Produit ajouté au panier !");
        }

        loadProduct();
    </script>

</body>
</html>
