<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail produit - Ranita Market</title>
    <link rel="stylesheet" href="products.css">
    <link rel="stylesheet" href="header.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">

    <!-- SEO de base (sera écrasé dynamiquement) -->
    <meta name="description" content="Découvrez nos produits de qualité livrés rapidement à Abidjan et partout en Côte d'Ivoire.">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:type" content="product">
    <meta property="og:site_name" content="Ranita Market">
    <meta property="og:locale" content="fr_FR">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa;
            color: #111827;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            z-index: 9999;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .product-page {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .product-page {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .gallery-main {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

            .gallery-main img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.4s ease;
            }

                .gallery-main img:hover {
                    transform: scale(1.03);
                }

        .gallery-thumbs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .gallery-thumb {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
            background: white;
        }

            .gallery-thumb.active {
                border-color: #10b981;
            }

            .gallery-thumb img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .product-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #10b981;
            background: #ecfdf5;
            padding: 4px 12px;
            border-radius: 999px;
        }

        .product-title {
            font-size: 26px;
            font-weight: 800;
            line-height: 1.3;
        }

        .product-short-desc {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
        }

        .price-block {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            border-top: 1px solid #f3f4f6;
            border-bottom: 1px solid #f3f4f6;
        }

        .price-main {
            font-size: 28px;
            font-weight: 800;
        }

        .price-old {
            font-size: 16px;
            color: #9ca3af;
            text-decoration: line-through;
        }

        .price-discount {
            background: #fef2f2;
            color: #ef4444;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .variants-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .variant-label {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
        }

        .variant-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .variant-btn {
            padding: 8px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
            color: #374151;
        }

            .variant-btn:hover {
                border-color: #10b981;
                color: #10b981;
            }

            .variant-btn.selected {
                border-color: #10b981;
                background: #10b981;
                color: white;
            }

            .variant-btn.out-of-stock {
                opacity: 0.4;
                cursor: not-allowed;
                text-decoration: line-through;
            }

        .qty-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-label {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f9fafb;
            font-size: 18px;
            cursor: pointer;
            font-weight: 700;
            color: #374151;
            transition: background 0.2s;
        }

            .qty-btn:hover {
                background: #e5e7eb;
            }

        .qty-input {
            width: 50px;
            height: 36px;
            border: none;
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            outline: none;
        }

        .stock-info {
            font-size: 13px;
            color: #6b7280;
        }

            .stock-info.low {
                color: #f59e0b;
                font-weight: 700;
            }

            .stock-info.out {
                color: #ef4444;
                font-weight: 700;
            }

        .btn-add-cart {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

            .btn-add-cart:hover {
                background: #059669;
                transform: translateY(-1px);
            }

            .btn-add-cart:disabled {
                background: #f3f4f6;
                color: #9ca3af;
                cursor: not-allowed;
                transform: none;
            }

        .btn-disabled {
            width: 100%;
            background: #f3f4f6;
            color: #9ca3af;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: not-allowed;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

            .back-link:hover {
                color: #10b981;
            }

        .product-description-full {
            max-width: 1100px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }

            .product-description-full h3 {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 12px;
            }

            .product-description-full p {
                font-size: 14px;
                color: #6b7280;
                line-height: 1.8;
                white-space: pre-line;
            }

        .attributes-block {
            background: #f9fafb;
            border-radius: 12px;
            padding: 16px;
        }

            .attributes-block h4 {
                font-size: 13px;
                font-weight: 700;
                color: #374151;
                margin-bottom: 10px;
            }

        .attr-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid #e5e7eb;
        }

            .attr-row:last-child {
                border-bottom: none;
            }

        .attr-key {
            color: #9ca3af;
        }

        .attr-val {
            font-weight: 600;
            color: #374151;
        }

        .loading-page {
            text-align: center;
            padding: 80px 20px;
            color: #9ca3af;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- Navbar mobile (visible uniquement sur mobile via header.css) -->
    <nav class="mob-header">
        <a href="index.html" class="mob-header-logo">🛒 Ranita Market</a>
        <div style="flex:1"></div>
        <a href="cart.html" class="mob-icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" /><line x1="3" y1="6" x2="21" y2="6" /></svg><span class="mob-cart-badge" id="mobCartBadge" style="display:none">0</span></a>
        <a href="login.html" class="mob-icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg></a>
    </nav>

    <!-- Header desktop (masqué sur mobile via header.css) -->
    <header class="site-header">
        <div class="site-logo" onclick="window.location.href='index.html'">🛒 Ranita Market</div>
        <nav style="display:flex;align-items:center;gap:8px;">
            <a href="products.html">Produits</a>
            <a href="cart.html" class="cart-link" style="white-space:nowrap;min-width:120px;text-align:center;">🛒 Panier (<span id="cartCount">0</span>)</a>
        </nav>
    </header>

    <div id="productDetails" style="padding-top: 92px;">
        <div class="loading-page">Chargement du produit...</div>
    </div>

    <script>
        const API_BASE = "https://ranitaapi-production.up.railway.app/api";
        const params = new URLSearchParams(window.location.search);
        const productId = params.get("id");

        let currentProduct = null;
        let selectedVariant = null;
        let quantity = 1;
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        updateCartCount();

        // ── SEO DYNAMIQUE ──────────────────────────────────────────────────────
        function updateSEO(product, images) {
            const title = `${product.name} — Ranita Market`;
            const description = product.shortDescription
                ? `${product.shortDescription} | ${Number(product.price).toLocaleString()} FCFA. Livraison rapide en Côte d'Ivoire.`
                : `Achetez ${product.name} à ${Number(product.price).toLocaleString()} FCFA sur Ranita Market. Livraison rapide à Abidjan.`;
            const imageUrl = images[0] || 'https://www.ranita-shop.com/images/logo.png';
            const pageUrl = `https://www.ranita-shop.com/product-details.html?id=${product.id}`;

            // Title + meta de base
            document.title = title;
            setMeta('name', 'description', description);
            setMeta('name', 'keywords', `${product.name}, ${product.category?.name || ''}, acheter en ligne Côte d'Ivoire, Abidjan, Ranita Market`);
            setMeta('name', 'robots', 'index, follow');

            // Open Graph
            setMeta('property', 'og:title', title);
            setMeta('property', 'og:description', description);
            setMeta('property', 'og:image', imageUrl);
            setMeta('property', 'og:url', pageUrl);
            setMeta('property', 'og:type', 'product');
            setMeta('property', 'og:locale', 'fr_FR');
            setMeta('property', 'og:site_name', 'Ranita Market');
            setMeta('property', 'product:price:amount', product.price);
            setMeta('property', 'product:price:currency', 'XOF');

            // Twitter Card
            setMeta('name', 'twitter:card', 'summary_large_image');
            setMeta('name', 'twitter:title', title);
            setMeta('name', 'twitter:description', description);
            setMeta('name', 'twitter:image', imageUrl);

            // Canonical
            let canonical = document.querySelector('link[rel="canonical"]');
            if (!canonical) {
                canonical = document.createElement('link');
                canonical.rel = 'canonical';
                document.head.appendChild(canonical);
            }
            canonical.href = pageUrl;

            // JSON-LD — Google Rich Results (étoiles, prix, disponibilité)
            const hasStock = (product.stock > 0) ||
                (product.variants && product.variants.some(v => v.stock > 0));

            const jsonLd = {
                "@context": "https://schema.org/",
                "@type": "Product",
                "name": product.name,
                "description": product.shortDescription || product.description || product.name,
                "image": images,
                "sku": product.sku || `RAN-${product.id}`,
                "url": pageUrl,
                ...(product.brand ? { "brand": { "@type": "Brand", "name": product.brand } } : {}),
                "offers": {
                    "@type": "Offer",
                    "url": pageUrl,
                    "priceCurrency": "XOF",
                    "price": product.price,
                    "availability": hasStock
                        ? "https://schema.org/InStock"
                        : "https://schema.org/OutOfStock",
                    "seller": { "@type": "Organization", "name": "Ranita Market" },
                    "shippingDetails": {
                        "@type": "OfferShippingDetails",
                        "shippingDestination": {
                            "@type": "DefinedRegion",
                            "addressCountry": "CI"
                        },
                        "deliveryTime": {
                            "@type": "ShippingDeliveryTime",
                            "handlingTime": { "@type": "QuantitativeValue", "minValue": 0, "maxValue": 1, "unitCode": "DAY" },
                            "transitTime": { "@type": "QuantitativeValue", "minValue": 1, "maxValue": 3, "unitCode": "DAY" }
                        }
                    }
                }
            };

            const oldLd = document.getElementById('product-jsonld');
            if (oldLd) oldLd.remove();
            const script = document.createElement('script');
            script.id = 'product-jsonld';
            script.type = 'application/ld+json';
            script.textContent = JSON.stringify(jsonLd);
            document.head.appendChild(script);
        }

        function setMeta(attr, name, content) {
            let el = document.querySelector(`meta[${attr}="${name}"]`);
            if (!el) {
                el = document.createElement('meta');
                el.setAttribute(attr, name);
                document.head.appendChild(el);
            }
            el.setAttribute('content', content);
        }

        // ── MASQUER NOM CLIENT ─────────────────────────────────────────────────
        function maskName(fullName) {
            if (!fullName) return 'Client';
            const parts = fullName.trim().split(' ');
            if (parts.length === 1) return parts[0].charAt(0) + '***';
            return parts[0] + ' ' + parts[1].charAt(0) + '***';
        }

        // ── AVIS ───────────────────────────────────────────────────────────────
        async function loadReviews() {
            const res = await fetch(`${API_BASE}/reviews/product/${productId}`);
            const reviews = await res.json();
            const container = document.getElementById("reviewsList");
            if (!reviews.length) {
                container.innerHTML = `<p style="color:#9ca3af;font-size:14px;">Aucun avis pour ce produit.</p>`;
                return;
            }
            const moyenne = (reviews.reduce((s, r) => s + r.note, 0) / reviews.length).toFixed(1);
            let visible = 3;
            function render() {
                const slice = reviews.slice(0, visible);
                container.innerHTML = `
                            <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
                                <span style="font-size:28px;font-weight:800;color:#f59e0b;">${moyenne}</span>
                                <span style="font-size:22px;color:#f59e0b;">${"★".repeat(Math.round(moyenne))}${"☆".repeat(5 - Math.round(moyenne))}</span>
                                <span style="font-size:13px;color:#6b7280;">${reviews.length} avis</span>
                            </div>
                            ${slice.map(r => `
                            <div style="padding:16px;border-bottom:1px solid #f3f4f6;">
                                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                                    <span style="color:#f59e0b;font-size:16px;">${"★".repeat(r.note)}${"☆".repeat(5 - r.note)}</span>
                                    <strong style="font-size:14px;">${maskName(r.client)}</strong>
                                    <span style="font-size:12px;color:#9ca3af;margin-left:auto;">${new Date(r.createdAt).toLocaleDateString('fr-FR')}</span>
                                </div>
                                ${r.commentaire ? `<p style="font-size:14px;color:#374151;margin:0;">${r.commentaire}</p>` : ''}
                            </div>`).join('')}
                            ${reviews.length > visible ? `
                            <button onclick="showMore()"
                                style="width:100%;margin-top:16px;padding:12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;color:#374151;">
                                Voir plus (${reviews.length - visible} restants)
                            </button>` : ''}`;
            }
            window.showMore = () => { visible += 3; render(); };
            render();

            // JSON-LD avis — enrichit les Rich Results Google
            if (reviews.length > 0) {
                const avgRating = parseFloat(moyenne);
                const reviewsLd = {
                    "@context": "https://schema.org/",
                    "@type": "Product",
                    "name": currentProduct?.name || '',
                    "aggregateRating": {
                        "@type": "AggregateRating",
                        "ratingValue": avgRating,
                        "reviewCount": reviews.length,
                        "bestRating": 5,
                        "worstRating": 1
                    }
                };
                const oldR = document.getElementById('reviews-jsonld');
                if (oldR) oldR.remove();
                const s = document.createElement('script');
                s.id = 'reviews-jsonld';
                s.type = 'application/ld+json';
                s.textContent = JSON.stringify(reviewsLd);
                document.head.appendChild(s);
            }
        }

        function updateCartCount() {
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById("cartCount").textContent = total;
            const mob = document.getElementById("mobCartCount"); if (mob) mob.textContent = total;
        }

        function showToast(msg) {
            const t = document.createElement("div");
            t.className = "toast"; t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function calcDiscount(price, oldPrice) {
            if (!oldPrice || oldPrice <= price) return null;
            return Math.round((1 - price / oldPrice) * 100);
        }

        function selectVariant(variantId) {
            selectedVariant = currentProduct.variants.find(v => v.id === variantId);
            document.querySelectorAll(".variant-btn").forEach(b => {
                b.classList.toggle("selected", parseInt(b.dataset.id) === variantId);
            });
            updateStockDisplay();
        }

        function getStock() {
            if (selectedVariant) return selectedVariant.stock;
            if (currentProduct.variants && currentProduct.variants.length > 0) return null;
            return currentProduct.stock;
        }

        function updateStockDisplay() {
            const stock = getStock();
            const stockEl = document.getElementById("stockInfo");
            const addBtn = document.getElementById("addBtn");
            if (stock === null) {
                stockEl.textContent = "Sélectionnez une variante";
                stockEl.className = "stock-info";
                if (addBtn) addBtn.disabled = true;
                return;
            }
            if (stock <= 0) {
                stockEl.textContent = "Rupture de stock";
                stockEl.className = "stock-info out";
                if (addBtn) { addBtn.disabled = true; addBtn.textContent = "Rupture de stock"; }
            } else if (stock <= 5) {
                stockEl.textContent = `⚠️ Plus que ${stock} en stock`;
                stockEl.className = "stock-info low";
                if (addBtn) { addBtn.disabled = false; addBtn.textContent = "🛒 Ajouter au panier"; }
            } else {
                stockEl.textContent = `En stock (${stock} disponibles)`;
                stockEl.className = "stock-info";
                if (addBtn) { addBtn.disabled = false; addBtn.textContent = "🛒 Ajouter au panier"; }
            }
        }

        function changeQty(delta) {
            const stock = getStock() || 99;
            quantity = Math.max(1, Math.min(stock, quantity + delta));
            document.getElementById("qtyInput").value = quantity;
        }

        function addToCart() {
            if (!currentProduct) return;
            const hasVariants = currentProduct.variants && currentProduct.variants.length > 0;
            if (hasVariants && !selectedVariant) { showToast("⚠️ Choisissez une variante d'abord !"); return; }
            const stock = getStock();
            if (stock <= 0) { showToast("Rupture de stock"); return; }
            const cartKey = hasVariants ? `${currentProduct.id}-${selectedVariant.id}` : `${currentProduct.id}`;
            const existing = cart.find(i => i.cartKey === cartKey);
            if (existing) {
                existing.quantity = Math.min(existing.quantity + quantity, stock);
            } else {
                cart.push({
                    cartKey, id: currentProduct.id, name: currentProduct.name,
                    price: selectedVariant?.price || currentProduct.price,
                    imageUrl: currentProduct.imageUrl, quantity,
                    variant: selectedVariant?.combination || null,
                    variantId: selectedVariant?.id || null,
                    maxStock: getStock()
                });
            }
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartCount();
            showToast(`✅ ${quantity} article(s) ajouté(s) au panier !`);
        }

        // ── CHARGER PRODUIT ────────────────────────────────────────────────────
        async function loadProduct() {
            if (!productId) {
                document.getElementById("productDetails").innerHTML = "<p style='padding:40px;text-align:center'>Produit invalide.</p>";
                return;
            }
            const res = await fetch(`${API_BASE}/products/${productId}`);
            if (!res.ok) {
                document.getElementById("productDetails").innerHTML = "<p style='padding:40px;text-align:center'>Produit introuvable.</p>";
                return;
            }
            currentProduct = await res.json();

            let images = [];
            try { images = JSON.parse(currentProduct.images || "[]"); } catch (e) { }
            if (images.length === 0 && currentProduct.imageUrl) images = [currentProduct.imageUrl];
            if (images.length === 0) images = ["https://via.placeholder.com/600x600?text=Ranita"];

            // ✅ SEO dynamique — titre, og:image, JSON-LD, canonical
            updateSEO(currentProduct, images);

            const discount = calcDiscount(currentProduct.price, currentProduct.oldPrice);
            let attrs = {};
            try { attrs = JSON.parse(currentProduct.attributes || "{}"); } catch (e) { }
            const attrKeys = Object.keys(attrs).filter(k => attrs[k]);
            const hasVariants = currentProduct.variants && currentProduct.variants.length > 0;
            const globalStock = hasVariants
                ? currentProduct.variants.reduce((s, v) => s + v.stock, 0)
                : currentProduct.stock;

            document.getElementById("productDetails").innerHTML = `
                        <div style="max-width:1100px;margin:16px auto 0;padding:0 20px;">
                            <a href="products.html" class="back-link">← Retour aux produits</a>
                            <div style="display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;">
                                ${currentProduct.category ? `<span class="product-badge">${currentProduct.category.name}</span>` : ''}
                                <span id="seller-badge"></span>
                            </div>
                        </div>
                        <div class="product-page">
                            <div class="gallery">
                                <div class="gallery-main">
                                    <img id="mainImg" src="${images[0]}" alt="${currentProduct.name}">
                                </div>
                                ${images.length > 1 ? `
                                <div class="gallery-thumbs">
                                    ${images.map((url, i) => `
                                        <div class="gallery-thumb ${i === 0 ? 'active' : ''}"
                                             onclick="document.getElementById('mainImg').src='${url}';
                                                      this.parentElement.querySelectorAll('.gallery-thumb').forEach(t=>t.classList.remove('active'));
                                                      this.classList.add('active')">
                                            <img src="${url}" alt="${currentProduct.name} — image ${i + 1}">
                                        </div>`).join('')}
                                </div>` : ''}
                            </div>
                            <div class="product-info">
                                <h1 class="product-title">${currentProduct.name}</h1>
                                ${currentProduct.shortDescription ? `<p class="product-short-desc">${currentProduct.shortDescription}</p>` : ''}
                                <div class="price-block">
                                    <span class="price-main">${Number(currentProduct.price).toLocaleString()} FCFA</span>
                                    ${currentProduct.oldPrice ? `<span class="price-old">${Number(currentProduct.oldPrice).toLocaleString()} FCFA</span>` : ''}
                                    ${discount ? `<span class="price-discount">-${discount}%</span>` : ''}
                                </div>
                                ${hasVariants ? `
                                <div class="variants-section">
                                    <div class="variant-label">Choisir une variante :</div>
                                    <div class="variant-options">
                                        ${currentProduct.variants.map(v => `
                                            <button class="variant-btn ${v.stock <= 0 ? 'out-of-stock' : ''}"
                                                    data-id="${v.id}" onclick="selectVariant(${v.id})"
                                                    ${v.stock <= 0 ? 'disabled' : ''}>${v.combination}</button>`).join('')}
                                    </div>
                                </div>` : ''}
                                <div class="qty-block">
                                    <span class="qty-label">Quantité :</span>
                                    <div class="qty-controls">
                                        <button class="qty-btn" onclick="changeQty(-1)">−</button>
                                        <input type="number" id="qtyInput" class="qty-input" value="1" min="1" readonly>
                                        <button class="qty-btn" onclick="changeQty(1)">+</button>
                                    </div>
                                </div>
                                <div id="stockInfo" class="stock-info"></div>
                                ${globalStock <= 0
                    ? `<button class="btn-disabled" disabled>Rupture de stock</button>`
                    : `<button class="btn-add-cart" id="addBtn" onclick="addToCart()">🛒 Ajouter au panier</button>`}
                                ${attrKeys.length > 0 ? `
                                <div class="attributes-block">
                                    <h4>Caractéristiques</h4>
                                    ${attrKeys.map(k => `
                                        <div class="attr-row">
                                            <span class="attr-key">${k}</span>
                                            <span class="attr-val">${attrs[k]}</span>
                                        </div>`).join('')}
                                </div>` : ''}
                            </div>
                        </div>
                        ${currentProduct.description ? `
                        <div class="product-description-full">
                            <h3>Description du produit</h3>
                            <p>${currentProduct.description}</p>
                        </div>` : ''}
                        <div class="product-description-full" id="reviewsSection">
                            <h3>⭐ Avis clients</h3>
                            <div id="reviewsList"><p style="color:#9ca3af;font-size:14px;">Chargement des avis...</p></div>
                        </div>`;

            const firstAvailable = currentProduct.variants?.find(v => v.stock > 0);
            if (firstAvailable) selectVariant(firstAvailable.id);
            updateStockDisplay();
        }

        loadProduct().then(() => { loadReviews(); loadSellerInfo(); });

        async function loadSellerInfo() {
            try {
                const res = await fetch(`${API_BASE}/sellers/product/${productId}`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.sellerId) {
                    document.getElementById('seller-badge').innerHTML = `
                                <a href="boutique.html?id=${data.sellerId}"
                                   style="display:inline-flex;align-items:center;gap:6px;background:#f0fdf4;color:#059669;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;border:1px solid #d1fae5;">
                                    🏪 ${data.shopName}
                                </a>`;
                }
            } catch (e) { }
        }
    </script>
    <script src="/cart-badge.js"></script>
</body>
</html>
