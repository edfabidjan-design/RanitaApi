<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Client - Ranita</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
</head>
<body>

    <div class="auth-card">
        <div class="auth-logo" onclick="location.href='index.html'">🛒 Ranita Market</div>
        <h2>Connexion</h2>

        <div id="errorMsg" style="display:none;background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;"></div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <div style="position:relative;">
                <input type="password" id="password" placeholder="Mot de passe" required style="width:100%;padding-right:44px;">
                <span onclick="togglePwd()" id="eyeBtn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;color:#6b7280;user-select:none;z-index:1;">👁</span>
            </div>
            <button type="submit">Se connecter</button>
        </form>

        <div class="auth-links">
            <a href="forgot-password.html">Mot de passe oublié ?</a><br>
            <a id="registerLink" href="register.html">Créer un compte</a>
        </div>
    </div>

    <script>
        const API = "https://ranitaapi-production.up.railway.app/api/client-auth";

        // ── Transmettre le code parrainage vers register.html ──
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        const redirect = urlParams.get('redirect');

        const registerLink = document.getElementById('registerLink');
        let registerHref = 'register.html';
        if (refCode) registerHref += '?ref=' + refCode;
        if (redirect) registerHref += (refCode ? '&' : '?') + 'redirect=' + redirect;
        registerLink.href = registerHref;


        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function togglePwd() {
            const pwd = document.getElementById('password');
            const btn = document.getElementById('eyeBtn');
            if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = '🙈'; }
            else { pwd.type = 'password'; btn.textContent = '👁'; }
        }


        async function registerClientPush(clientId) {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
            try {
                const reg = await navigator.serviceWorker.register('/sw-client.js');
                if (Notification.permission === 'default') {
                    const permission = await Notification.requestPermission();
                    if (permission !== 'granted') return;
                }
                if (Notification.permission !== 'granted') return;
                const existing = await reg.pushManager.getSubscription();
                if (existing) await existing.unsubscribe();
                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: 'BK0OMo2QWE4SuKh0RTa6yvHfpkBXcPzL5sZkaJe3nNLesXQjRDhMzyimA8UNBCGvB9AOYpv_Q0RQrmgmA9YdNdY'
                });
                await fetch('/api/notifications/subscribe-client', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        clientId: clientId,
                        endpoint: sub.endpoint,
                        p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('p256dh')))),
                        auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('auth'))))
                    })
                });
            } catch (e) { console.error('Push error:', e); }
        }

        document.getElementById("loginForm").addEventListener("submit", async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const modal = document.getElementById('loadingModal');
            const msg = document.getElementById('loadingMsg');

            btn.disabled = true;
            modal.style.display = 'flex';
            msg.textContent = 'Vérification de vos identifiants...';

            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                let data = {};
                try { data = await res.json(); } catch (e) {
                    const text = await res.text().catch(() => '');
                    modal.style.display = 'none';
                    showError(text || 'Email ou mot de passe incorrect');
                    btn.disabled = false;
                    return;
                }

                if (!res.ok) {
                    modal.style.display = 'none';
                    showError(data.message || 'Email ou mot de passe incorrect');
                    btn.disabled = false;
                    return;
                }

                msg.textContent = 'Connexion réussie ! Redirection...';
                localStorage.setItem("client", JSON.stringify(data));

                if (refCode && !data.referredById) {
                    try {
                        await fetch(`${API}/apply-referral`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ clientId: data.id, referralCode: refCode })
                        });
                    } catch (e) { }
                }

                await registerClientPush(data.id);

                setTimeout(function () {
                    window.location.href = redirect || "index.html";
                }, 800);

            } catch (e) {
                modal.style.display = 'none';
                showError('Erreur: ' + e.message);
                btn.disabled = false;
            }
        });
    </script>


    <!-- Modal chargement -->
    <div id="loadingModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
        <div style="background:white;border-radius:20px;padding:40px 32px;text-align:center;max-width:280px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);">
            <div style="font-size:42px;margin-bottom:16px;">🛒</div>
            <div style="font-size:16px;font-weight:700;color:#111827;margin-bottom:8px;">Connexion en cours...</div>
            <div style="font-size:13px;color:#6b7280;margin-bottom:20px;" id="loadingMsg">Vérification de vos identifiants</div>
            <!-- Spinner -->
            <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;"></div>
        </div>
    </div>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

</body>
</html>
