<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Client - Ranita</title>
    <link rel="stylesheet" href="auth.css">
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#10b981"></head>
<body>

    <div class="auth-card">

        <div class="auth-logo" onclick="location.href='index.html'">
            ?? Ranita Market
        </div>

        <h2>Connexion</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>

            <button type="submit">Se connecter</button>
        </form>

        <div class="auth-links">
            <a href="forgot-password.html">Mot de passe oubli� ?</a><br>
            <a href="register.html">Cr�er un compte</a>
        </div>

    </div>

    <script>
        const API = "https://ranitaapi-production.up.railway.app/api/client-auth";


        async function registerClientPush(clientId) {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
            try {
                const reg = await navigator.serviceWorker.register('/sw-client.js');
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') return;

                const existing = await reg.pushManager.getSubscription();
                if (existing) return;

                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: 'BK0OMo2QWE4SuKh0RTa6yvHfpkBXcPzL5sZkaJe3nNLesXQjRDhMzyimA8UNBCGvB9AOYpv_Q0RQrmgmA9YdNdY'
                });

                await fetch('https://ranitaapi-production.up.railway.app/api/notifications/subscribe-client', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        clientId: clientId,
                        endpoint: sub.endpoint,
                        p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('p256dh')))),
                        auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('auth'))))
                    })
                });
                console.log('Push client enregistr� !');
            } catch (e) {
                console.error('Push error:', e);
            }
        }



        document.getElementById("loginForm").addEventListener("submit", async e => {
            e.preventDefault();

            const res = await fetch(`${API}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: email.value,
                    password: password.value
                })
            });

            const data = await res.json();

            if (!res.ok) {
                alert(data);
                return;
            }

            localStorage.setItem("client", JSON.stringify(data));

            // ? Demander permission notifications
            await registerClientPush(data.id);

            alert("Connexion OK");
            const redirect = new URLSearchParams(window.location.search).get("redirect");
            window.location.href = redirect || "products.html";
        });
    </script>

</body>
</html>
