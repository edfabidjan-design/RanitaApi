<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Client - Ranita</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
</head>
<body>

    <div class="auth-card">
        <div class="auth-logo" onclick="location.href='index.html'">🛒 Ranita Market</div>
        <h2>Connexion</h2>

        <div id="errorMsg" style="display:none;background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;"></div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <div style="position:relative;">
                <input type="password" id="password" placeholder="Mot de passe" required style="width:100%;padding-right:44px;">
                <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#6b7280;" id="eyeBtn">👁</button>
            </div>
            <button type="submit">Se connecter</button>
        </form>

        <div class="auth-links">
            <a href="forgot-password.html">Mot de passe oublié ?</a><br>
            <a id="registerLink" href="register.html">Créer un compte</a>
        </div>
    </div>

    <script>
        const API = "/api/client-auth";

        // ── Transmettre le code parrainage vers register.html ──
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        const redirect = urlParams.get('redirect');

        const registerLink = document.getElementById('registerLink');
        let registerHref = 'register.html';
        if (refCode) registerHref += '?ref=' + refCode;
        if (redirect) registerHref += (refCode ? '&' : '?') + 'redirect=' + redirect;
        registerLink.href = registerHref;


        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function togglePwd() {
            const pwd = document.getElementById('password');
            const btn = document.getElementById('eyeBtn');
            if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = '🙈'; }
            else { pwd.type = 'password'; btn.textContent = '👁'; }
        }


        async function registerClientPush(clientId) {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
            try {
                const reg = await navigator.serviceWorker.register('/sw-client.js');
                if (Notification.permission === 'default') {
                    const permission = await Notification.requestPermission();
                    if (permission !== 'granted') return;
                }
                if (Notification.permission !== 'granted') return;
                const existing = await reg.pushManager.getSubscription();
                if (existing) await existing.unsubscribe();
                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: 'BK0OMo2QWE4SuKh0RTa6yvHfpkBXcPzL5sZkaJe3nNLesXQjRDhMzyimA8UNBCGvB9AOYpv_Q0RQrmgmA9YdNdY'
                });
                await fetch('/api/notifications/subscribe-client', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        clientId: clientId,
                        endpoint: sub.endpoint,
                        p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('p256dh')))),
                        auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('auth'))))
                    })
                });
            } catch (e) { console.error('Push error:', e); }
        }

        document.getElementById("loginForm").addEventListener("submit", async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.textContent = 'Connexion...';

            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.message || 'Email ou mot de passe incorrect');
                    btn.disabled = false; btn.textContent = 'Se connecter';
                    return;
                }

                localStorage.setItem("client", JSON.stringify(data));
                if (refCode && !data.referredById) {
                    try {
                        await fetch(`${API}/apply-referral`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ clientId: data.id, referralCode: refCode })
                        });
                    } catch (e) { }
                }
                await registerClientPush(data.id);
                window.location.href = redirect || "products.html";
            } catch (e) {
                showError('Erreur réseau — réessayez');
                btn.disabled = false; btn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
