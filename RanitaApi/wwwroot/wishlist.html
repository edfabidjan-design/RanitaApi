<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Favoris - Ranita Market</title>
    <link rel="stylesheet" href="header.css">
    <style>
        :root {
            --g: #10b981;
            --gd: #059669;
            --dk: #0D1117;
            --dk2: #161B22;
            --dkb: rgba(255,255,255,.08);
            --dkt: #F0F6FC;
            --dkt2: #8B949E;
            --w: #ffffff;
            --w2: #f9fafb;
            --w3: #f3f4f6;
            --wb: #e5e7eb;
            --t: #111827;
            --t2: #6b7280;
            --t3: #9ca3af;
            --red: #EF4444;
            --amber: #F59E0B;
            --r: 12px;
            --rsm: 8px;
            --promo-h: 36px;
            --header-h: 58px;
            --mob-header-h: 54px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--w2);
            color: var(--t);
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        img {
            display: block;
        }

        a {
            text-decoration: none;
        }

        /* HEADER MOBILE */
        .mob-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 500;
            background: rgba(13,17,23,.97);
            padding: 0 12px;
            height: var(--mob-header-h);
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--dkb);
        }

        .mob-logo {
            font-size: 15px;
            font-weight: 800;
            color: var(--dkt);
        }

            .mob-logo span {
                color: var(--g);
            }

        .mob-icon {
            color: var(--dkt2);
            padding: 6px;
            position: relative;
            flex-shrink: 0;
        }

        /* HEADER DESKTOP */
        .site-header {
            position: fixed;
            top: var(--promo-h);
            z-index: 500;
            left: 0;
            right: 0;
            background: rgba(13,17,23,.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--dkb);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            height: var(--header-h);
        }

        .site-logo {
            font-size: 17px;
            font-weight: 800;
            color: var(--dkt);
            cursor: pointer;
        }

            .site-logo span {
                color: var(--g);
            }

        .site-nav {
            display: flex;
            align-items: center;
            gap: 6px;
        }

            .site-nav a {
                color: var(--dkt2);
                font-size: 13px;
                font-weight: 500;
                padding: 6px 12px;
                border-radius: var(--rsm);
                transition: all .2s;
            }

                .site-nav a:hover {
                    color: var(--dkt);
                    background: rgba(255,255,255,.06);
                }

        .btn-primary {
            background: var(--g) !important;
            color: #fff !important;
            font-weight: 700 !important;
            padding: 7px 16px !important;
            border-radius: var(--rsm) !important;
        }

        /* NAV BAS */
        .mob-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(13,17,23,.97);
            border-top: 1px solid var(--dkb);
            z-index: 500;
            padding: 6px 0;
        }

        .mob-nav-inner {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .mob-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: var(--dkt2);
            font-size: 9px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            text-decoration: none;
            flex: 1;
        }

            .mob-nav-item svg {
                width: 22px;
                height: 22px;
            }

            .mob-nav-item.active {
                color: var(--g);
            }

        .mob-fab {
            background: linear-gradient(135deg, var(--g), var(--gd));
            color: #fff;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -16px;
            box-shadow: 0 4px 16px rgba(16,185,129,.4);
        }

        /* PAGE */
        .page-wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: calc(var(--promo-h) + var(--header-h) + 28px) 20px 40px;
        }

        .page-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--t);
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .page-title span {
                color: var(--red);
            }

        .clear-btn {
            background: #fee2e2;
            color: var(--red);
            border: none;
            padding: 8px 18px;
            border-radius: var(--rsm);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: background .2s;
        }

            .clear-btn:hover {
                background: #fecaca;
            }

        /* GRID */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
        }

        /* CARD */
        .p-card {
            background: var(--w);
            border: 1px solid var(--wb);
            border-radius: var(--r);
            overflow: hidden;
            cursor: pointer;
            transition: all .25s;
            position: relative;
            box-shadow: 0 1px 4px rgba(0,0,0,.05);
            display: flex;
            flex-direction: column;
        }

            .p-card:hover {
                border-color: var(--g);
                transform: translateY(-4px);
                box-shadow: 0 8px 24px rgba(16,185,129,.14);
            }

        .p-img {
            height: 165px;
            position: relative;
            overflow: hidden;
            background: var(--w3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

            .p-img img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                padding: 6px;
                transition: transform .3s;
            }

        .p-card:hover .p-img img {
            transform: scale(1.04);
        }

        .p-ph {
            font-size: 48px;
        }

        .w-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #fff;
            border: 1px solid var(--red);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: var(--red);
            transition: all .2s;
            z-index: 2;
        }

            .w-btn:hover {
                background: var(--red);
                color: #fff;
            }

        .p-info {
            padding: 10px 12px 12px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .p-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--t);
            margin-bottom: 8px;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .p-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--g);
        }

        .add-btn {
            margin-left: auto;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--g), var(--gd));
            color: #fff;
            border: none;
            border-radius: var(--rsm);
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
        }

            .add-btn:hover {
                opacity: .88;
            }

        .p-row {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        /* EMPTY */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .empty-icon {
            font-size: 64px;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--t);
        }

        .empty-sub {
            font-size: 14px;
            color: var(--t2);
        }

        .empty-btn {
            background: var(--g);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 8px;
        }

        /* SKELETON */
        .skeleton {
            background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: var(--rsm);
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .sk-img {
            height: 165px;
            border-radius: 0;
        }

        .sk-line {
            height: 12px;
            margin: 8px 12px;
        }

            .sk-line.lg {
                width: 80%;
            }

            .sk-line.sm {
                width: 60%;
                height: 10px;
            }

        .sk-btn {
            height: 28px;
            width: 80px;
            margin: 8px 12px 12px auto;
        }

        @media(max-width: 768px) {
            :root {
                --promo-h: 0px;
            }

            .site-header {
                display: none;
            }

            .mob-header {
                display: flex;
            }

            .mob-nav {
                display: block;
            }

            .page-wrap {
                padding: calc(var(--mob-header-h) + 20px) 12px 20px;
            }

            .products-grid {
                grid-template-columns: repeat(2,1fr);
                gap: 10px;
            }

            .p-img {
                height: 140px;
            }

            .page-title {
                font-size: 18px;
            }
        }


        @media(max-width:768px) {
            #scrollTopBtn {
                right: auto !important;
                left: 16px !important;
                bottom: 80px !important;
            }
        }

        @media(min-width:769px) {
            #scrollTopBtn {
                right: 16px !important;
                bottom: 32px !important;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER DESKTOP -->
    <header class="site-header">
        <div class="site-logo" onclick="location.href='index.html'">🛒 Ranita<span>Market</span></div>
        <nav class="site-nav">
            <a href="products.html">Produits</a>
            <a href="vendeur.html">Vendre</a>
            <div id="authNav" style="display:inline-flex;align-items:center;gap:6px;"></div>
            <a href="cart.html" style="position:relative;padding:6px 10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#8B949E"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" /><line x1="3" y1="6" x2="21" y2="6" /></svg>
                <span id="cartBadge" style="display:none;position:absolute;top:2px;right:4px;background:var(--g);color:#fff;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;align-items:center;justify-content:center;"></span>
            </a>
        </nav>
    </header>

    <!-- HEADER MOBILE -->
    <nav class="mob-header">
        <div class="mob-logo" onclick="location.href='index.html'">🛒 Ranita<span>Market</span></div>
        <div style="flex:1;"></div>
        <a href="cart.html" class="mob-icon" style="position:relative;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" /><line x1="3" y1="6" x2="21" y2="6" /></svg>
            <span id="mobCartBadge" style="display:none;position:absolute;top:0;right:0;background:var(--g);color:#fff;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;align-items:center;justify-content:center;"></span>
        </a>
        <a href="login.html" class="mob-icon" id="mobAuthIcon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
        </a>
    </nav>

    <!-- PAGE -->
    <div class="page-wrap">
        <div class="page-head">
            <div class="page-title">
                <span>♥</span> Mes Favoris
                <span id="favCount" style="background:#fee2e2;color:var(--red);font-size:13px;padding:2px 10px;border-radius:999px;font-weight:700;"></span>
            </div>
            <button class="clear-btn" onclick="clearAll()">✕ Tout effacer</button>
        </div>
        <div class="products-grid" id="wishGrid">
            <div class="p-card"><div class="p-img"><div class="skeleton sk-img" style="width:100%;height:100%;"></div></div><div class="skeleton sk-line lg"></div><div class="skeleton sk-line sm"></div><div class="skeleton sk-btn"></div></div>
            <div class="p-card"><div class="p-img"><div class="skeleton sk-img" style="width:100%;height:100%;"></div></div><div class="skeleton sk-line lg"></div><div class="skeleton sk-line sm"></div><div class="skeleton sk-btn"></div></div>
        </div>
    </div>

    <!-- NAV MOBILE -->
    <nav class="mob-nav">
        <div class="mob-nav-inner">
            <a href="index.html" class="mob-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>
                Accueil
            </a>
            <a href="products.html" class="mob-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></svg>
                Catégories
            </a>
            <a href="cart.html" class="mob-nav-item">
                <div class="mob-fab">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" /><line x1="3" y1="6" x2="21" y2="6" /></svg>
                </div>
            </a>
            <a href="wishlist.html" class="mob-nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" /></svg>
                Favoris
            </a>
            <a href="vendeur-login.html" class="mob-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></svg>
                Vendre
            </a>
        </div>
    </nav>

    <script src="/cart-badge.js"></script>
    <script>
        // Auth
        (function () {
            var client = JSON.parse(localStorage.getItem('client') || 'null');
            var nav = document.getElementById('authNav');
            if (!nav) return;

            if (client) {
                nav.innerHTML = '<button onclick="toggleMenu(event)" style="background:#10b981;color:#fff;border:none;padding:7px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;font-family:Arial,sans-serif;">👤 ' + (client.name ? client.name.split(' ')[0] : 'Mon compte') + ' ▾</button>';
                var cMenu = document.createElement('div');
                cMenu.id = 'cMenu';
                cMenu.style.cssText = 'display:none;position:fixed;top:64px;right:20px;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);min-width:200px;z-index:99999;';
                cMenu.innerHTML =
                    '<a href="profile.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;font-family:Arial,sans-serif;">👤 Mon profil</a>' +
                    '<a href="client-orders.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;font-family:Arial,sans-serif;">📦 Mes commandes</a>' +
                    '<a href="wishlist.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;font-family:Arial,sans-serif;">❤️ Mes favoris</a>' +
                    '<div onclick="doLogout()" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#ef4444;font-weight:600;cursor:pointer;font-size:13px;font-family:Arial,sans-serif;">🚪 Déconnexion</div>';
                document.body.appendChild(cMenu);
            } else {
                nav.innerHTML = '<a href="login.html" style="color:var(--g);font-weight:700;" class="btn-outline">Connexion</a><a href="register.html" class="btn-primary" style="margin-left:6px;">Inscription</a>';
            }

            window.toggleMenu = function (e) {
                if (e) e.stopPropagation();
                var m = document.getElementById('cMenu');
                if (m) m.style.display = m.style.display === 'none' ? 'block' : 'none';
            };
            window.doLogout = function () { localStorage.removeItem('client'); location.href = 'index.html'; };
            document.addEventListener('click', function (e) {
                var m = document.getElementById('cMenu');
                if (m && !e.target.closest('#authNav') && !e.target.closest('#cMenu')) m.style.display = 'none';
            });

            var mobAuth = document.getElementById('mobAuthIcon');
            if (mobAuth && client) {
                mobAuth.removeAttribute('href');
                mobAuth.style.cursor = 'pointer';
                mobAuth.innerHTML = '<div style="background:#10b981;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">' + (client.name ? client.name[0].toUpperCase() : '?') + '</div>';
                var mobMenu = document.createElement('div');
                mobMenu.style.cssText = 'display:none;position:fixed;top:60px;right:8px;background:white;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);min-width:180px;z-index:99999;';
                mobMenu.innerHTML =
                    '<a href="profile.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;">👤 Mon profil</a>' +
                    '<a href="client-orders.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;">📦 Mes commandes</a>' +
                    '<a href="wishlist.html" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#111827;text-decoration:none;font-weight:600;font-size:13px;border-bottom:1px solid #f3f4f6;">❤️ Mes favoris</a>' +
                    '<div onclick="doLogout()" style="display:flex;align-items:center;gap:8px;padding:13px 16px;color:#ef4444;font-weight:600;cursor:pointer;font-size:13px;">🚪 Déconnexion</div>';
                document.body.appendChild(mobMenu);
                mobAuth.addEventListener('click', function (e) {
                    e.stopPropagation();
                    mobMenu.style.display = mobMenu.style.display === 'none' ? 'block' : 'none';
                });
                document.addEventListener('click', function (e) {
                    if (!e.target.closest('#mobAuthIcon')) mobMenu.style.display = 'none';
                });
            }

            // Badge panier
            var c = JSON.parse(localStorage.getItem('cart') || '[]');
            var t = c.reduce(function (s, i) { return s + (i.qty || 1); }, 0);
            ['cartBadge', 'mobCartBadge'].forEach(function (id) { var b = document.getElementById(id); if (b && t > 0) { b.textContent = t; b.style.display = 'flex'; } });
        })();

        // Wishlist
        var API = '/api/products';

        function removeFav(id) {
            var client = JSON.parse(localStorage.getItem('client') || 'null');
            if (!client) return;
            fetch('/api/wishlist/' + client.id + '/' + id, { method: 'DELETE' })
                .then(function () { loadWishlist(); })
                .catch(function () { });
        }

        function clearAll() {
            if (!confirm('Effacer tous les favoris ?')) return;
            localStorage.setItem('wishlist', '[]');
            loadWishlist();
        }

        function addCart(id, name, price, img) {
            var cart = JSON.parse(localStorage.getItem('cart') || '[]');
            var idx = cart.findIndex(function (i) { return i.id === id; });
            if (idx >= 0) { cart[idx].qty++; } else { cart.push({ id: id, name: name, price: price, imageUrl: img, qty: 1 }); }
            localStorage.setItem('cart', JSON.stringify(cart));
            var total = cart.reduce(function (s, i) { return s + i.qty; }, 0);
            ['cartBadge', 'mobCartBadge'].forEach(function (bid) { var b = document.getElementById(bid); if (b) { b.textContent = total; b.style.display = 'flex'; } });
        }

        async function loadWishlist() {
            var client = JSON.parse(localStorage.getItem('client') || 'null');
            var grid = document.getElementById('wishGrid');
            var countEl = document.getElementById('favCount');

            if (!client) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">♡</div><div class="empty-title">Connectez-vous</div><div class="empty-sub">Pour voir vos favoris</div><a href="login.html" class="empty-btn">Se connecter</a></div>';
                return;
            }

            try {
                var res = await fetch('/api/wishlist/' + client.id);
                var favs = await res.json();

                if (!favs.length) {
                    if (countEl) countEl.textContent = '0';
                    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">♡</div><div class="empty-title">Aucun favori</div><div class="empty-sub">Ajoutez des produits à vos favoris en cliquant sur ♡</div><a href="products.html" class="empty-btn">Découvrir les produits</a></div>';
                    return;
                }

                if (countEl) countEl.textContent = favs.length;

                grid.innerHTML = favs.map(function (f) {
                    var img = f.imageUrl ? '<img src="' + f.imageUrl + '" alt="' + f.name + '" loading="lazy">' : '<div class="p-ph">🛍️</div>';
                    return '<div class="p-card" onclick="location.href=\'product-details.html?id=' + f.productId + '\'">' +
                        '<div class="p-img">' + img +
                        '<button class="w-btn" onclick="event.stopPropagation();removeFav(' + f.productId + ')">✕</button></div>' +
                        '<div class="p-info"><div class="p-name">' + f.name + '</div>' +
                        '<div class="p-row"><span class="p-price">' + Number(f.price).toLocaleString('fr-FR') + ' F</span>' +
                        '<button class="add-btn" onclick="event.stopPropagation();addCart(' + f.productId + ',\'' + f.name.replace(/'/g, "\\'") + '\',' + f.price + ',\'' + (f.imageUrl || '') + '\')">+ Panier</button></div></div></div>';
                }).join('');

            } catch (e) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#6b7280;">Erreur de chargement.</div>';
            }
        }

        loadWishlist();
    </script>


    <!-- ── BOUTON RETOUR EN HAUT ── -->
    <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none;position:fixed;bottom:90px;right:16px;width:34px;height:34px;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);color:white;border:1px solid rgba(255,255,255,.15);border-radius:50%;font-size:16px;cursor:pointer;z-index:900;box-shadow:0 2px 8px rgba(0,0,0,.3);align-items:center;justify-content:center;transition:opacity .3s,transform .3s;">↑</button>
    <script>
        window.addEventListener('load', function () {
            var scrollBtn = document.getElementById('scrollTopBtn');
            if (!scrollBtn) return;
            scrollBtn.style.display = 'none';
            window.addEventListener('scroll', function () {
                if (window.scrollY > 400) {
                    scrollBtn.style.display = 'flex';
                    setTimeout(function () {
                        scrollBtn.style.opacity = '1';
                        scrollBtn.style.transform = 'scale(1)';
                    }, 10);
                } else {
                    scrollBtn.style.opacity = '0';
                    scrollBtn.style.transform = 'scale(.8)';
                    setTimeout(function () {
                        if (window.scrollY <= 400) scrollBtn.style.display = 'none';
                    }, 300);
                }
            });
        });
    </script>
