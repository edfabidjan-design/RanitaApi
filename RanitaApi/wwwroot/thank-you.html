<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande confirmée - Ranita</title>
    <link rel="stylesheet" href="products.css">
</head>
<body>

    <main class="thank-you-page">
        <div class="thank-you-card">
            <div class="success-icon">✅</div>

            <h1>Merci pour votre commande !</h1>

            <p id="orderNumber"></p>

            <p>
                Votre commande a été enregistrée avec succès.
                Notre équipe vous contactera rapidement pour la confirmation et la livraison.
            </p>

            <div class="thank-you-actions">
                <a href="client-orders.html" class="cart-link">Voir mes commandes</a>
                <a href="products.html" class="cart-link">Continuer mes achats</a>
                <a href="cart.html" class="secondary-link">Voir le panier</a>
            </div>
        </div>
    </main>

    <script>
        const orderId = localStorage.getItem("lastOrderId");

        if (!orderId) {
            window.location.href = "products.html";
        } else {
            document.getElementById("orderNumber").textContent =
                "Numéro de commande : #" + orderId;

            // nettoyage
            localStorage.removeItem("lastOrderId");
        }
    </script>

</body>
</html>
