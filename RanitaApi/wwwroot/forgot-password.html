<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oubli� - Ranita</title>
    <link rel="stylesheet" href="auth.css">
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#10b981"></head>
<body>

    <div class="auth-card">

        <div class="auth-logo" onclick="location.href='index.html'">
            ?? Ranita Market
        </div>

        <h2>Mot de passe oubli�</h2>
        <p style="color:#6b7280;margin-bottom:20px">
            Entrez votre email pour recevoir un code de r�initialisation.
        </p>

        <form id="forgotForm">
            <input type="email" id="email" placeholder="Votre email" required>
            <button type="submit">Envoyer le code</button>
        </form>

        <div class="auth-links">
            <a href="login.html">Retour � la connexion</a>
        </div>

    </div>

    <script>
        const API = "https://ranitaapi-production.up.railway.app/api/client-auth";
        const forgotForm = document.getElementById("forgotForm");
        const emailInput = document.getElementById("email");

        forgotForm.addEventListener("submit", async e => {
            e.preventDefault();

            const btn = forgotForm.querySelector("button");
            btn.disabled = true;
            btn.textContent = "Envoi...";

            try {
                const res = await fetch(`${API}/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: emailInput.value.trim() })
                });

                const text = await res.text();

                if (!res.ok) {
                    alert("Erreur : " + text);
                    btn.disabled = false;
                    btn.textContent = "Envoyer le code";
                    return;
                }

                alert("?? Si cet email existe, vous recevrez un code.");

                window.location.href = "reset-password.html";

            } catch (error) {
                alert("Erreur r�seau");
                console.error(error);
                btn.disabled = false;
                btn.textContent = "Envoyer le code";
            }
        });
    </script>

</body>
</html>
