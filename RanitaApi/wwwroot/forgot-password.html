<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mot de passe oublié - Ranita</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-card">

        <div class="auth-logo" onclick="location.href='index.html'">
            🛒 Ranita Market
        </div>

        <h2>Mot de passe oublié</h2>
        <p style="color:#6b7280;margin-bottom:20px">
            Entrez votre email pour recevoir un code de réinitialisation.
        </p>

        <form id="forgotForm">
            <input type="email" id="email" placeholder="Votre email" required>
            <button type="submit">Envoyer le code</button>
        </form>

        <div class="auth-links">
            <a href="login.html">Retour à la connexion</a>
        </div>

    </div>

    <script>
        const API = "https://ranita-api.onrender.com/api/client-auth";
        const forgotForm = document.getElementById("forgotForm");
        const emailInput = document.getElementById("email");

        forgotForm.addEventListener("submit", async e => {
            e.preventDefault();

            try {
                const res = await fetch(`${API}/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: emailInput.value.trim() })
                });

                const text = await res.text();

                if (!res.ok) {
                    alert("Erreur : " + text);
                    return;
                }

                alert("📩 Si cet email existe, vous recevrez un code. Vérifiez aussi vos spams.");

                window.location.href = "reset-password.html";

            } catch (error) {
                alert("Erreur réseau");
                console.error(error);
            }
        });
    </script>

</body>
</html>
