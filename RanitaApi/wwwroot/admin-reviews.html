<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita Admin - Avis</title>
    <link rel="stylesheet" href="admin-style.css">
    <script src="admin-notifications.js" defer></script>
</head>
<body>
    <header class="admin-header">
        <div class="logo" onclick="location.href='admin-dashboard.html'">🛒 Ranita Admin</div>
        <nav>
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="admin-products.html">Produits</a>
            <a href="admin-categories.html">Catégories</a>
            <a href="admin-orders.html">Commandes</a>
            <a href="admin-clients.html">Clients</a>
            <a href="admin-reviews.html" class="active">Avis</a>
        </nav>
        <button onclick="logout()">Déconnexion</button>
    </header>

    <div class="admin-container">
        <h1>⭐ Gestion des avis clients</h1>
        <div class="table-wrap">
            <table border="1" cellpadding="8">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Produit</th>
                        <th>Client</th>
                        <th>Note</th>
                        <th>Commentaire</th>
                        <th>Date</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="reviewsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
    const token = localStorage.getItem("adminToken");
    if (!token) window.location.href = "admin-login.html";

    function logout() {
        localStorage.removeItem("adminToken");
        window.location.href = "admin-login.html";
    }

    const API_BASE = "https://ranitaapi-production.up.railway.app/api";

    async function loadReviews() {
        const res = await fetch(`${API_BASE}/reviews`);
        const reviews = await res.json();
        const tbody = document.getElementById("reviewsTable");

        tbody.innerHTML = reviews.map(r => `
            <tr>
                <td>${r.id}</td>
                <td>${r.produit}</td>
                <td>${r.client}</td>
                <td style="color:#f59e0b;font-size:16px;">${"★".repeat(r.note)}${"☆".repeat(5 - r.note)}</td>
                <td>${r.commentaire || "—"}</td>
                <td>${new Date(r.createdAt).toLocaleDateString('fr-FR')}</td>
                <td>${r.approuve
                    ? '<span style="color:#10b981;font-weight:700;">✅ Approuvé</span>'
                    : '<span style="color:#f59e0b;font-weight:700;">⏳ En attente</span>'
                }</td>
                <td style="display:flex;gap:8px;">
                    ${!r.approuve ? `<button onclick="approve(${r.id})"
                        style="background:#10b981;color:white;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:700;">
                        ✅ Approuver
                    </button>` : ''}
                    <button onclick="deleteReview(${r.id})"
                        style="background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:700;">
                        🗑️ Supprimer
                    </button>
                </td>
            </tr>
        `).join('');
    }

    async function approve(id) {
        await fetch(`${API_BASE}/reviews/${id}/approve`, { method: "PATCH" });
        loadReviews();
    }

    async function deleteReview(id) {
        if (!confirm("Supprimer cet avis ?")) return;
        await fetch(`${API_BASE}/reviews/${id}`, { method: "DELETE" });
        loadReviews();
    }

    loadReviews();
    </script>
</body>
</html>
