<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita Admin - Produits</title>
    <link rel="stylesheet" href="admin-style.css">
    <style>
        .form-section {
            background: white;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            margin-bottom: 24px;
        }

            .form-section h3 {
                font-size: 15px;
                font-weight: 700;
                color: #374151;
                margin: 0 0 16px;
                padding-bottom: 8px;
                border-bottom: 2px solid #f3f4f6;
            }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

            .form-grid .full {
                grid-column: 1 / -1;
            }

            .form-grid input,
            .form-grid select,
            .form-grid textarea {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid #d1d5db;
                border-radius: 10px;
                font-size: 14px;
                font-family: inherit;
                box-sizing: border-box;
                background: #f9fafb;
            }

            .form-grid textarea {
                resize: vertical;
                min-height: 80px;
            }

            .form-grid label {
                font-size: 13px;
                font-weight: 600;
                color: #374151;
                display: block;
                margin-bottom: 4px;
            }

        .attr-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-save {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-reset {
            background: #f3f4f6;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
        }

            .toggle-switch input[type="checkbox"] {
                width: 20px;
                height: 20px;
                cursor: pointer;
            }
    </style>
</head>
<body>

    <header class="admin-header">
        <div class="logo" onclick="location.href='admin-dashboard.html'">🛒 Ranita Admin</div>
        <nav>
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="admin-products.html" class="active">Produits</a>
            <a href="admin-categories.html">Catégories</a>
            <a href="admin-attributes.html">Attributs</a>
            <a href="admin-orders.html">Commandes</a>
        </nav>
        <button onclick="logout()">Déconnexion</button>
    </header>

    <div class="admin-container">
        <h1>Gestion des produits</h1>

        <form id="productForm">
            <input type="hidden" id="productId">

            <!-- Infos de base -->
            <div class="form-section">
                <h3>📦 Informations de base</h3>
                <div class="form-grid">
                    <div>
                        <label>Nom du produit *</label>
                        <input type="text" id="productName" placeholder="Ex: Chemise Homme Slim" required>
                    </div>
                    <div>
                        <label>SKU (Code unique) *</label>
                        <input type="text" id="productSku" placeholder="Ex: RAN-CHM-001" required>
                    </div>
                    <div>
                        <label>Marque</label>
                        <input type="text" id="productBrand" placeholder="Ex: Nike, Samsung...">
                    </div>
                    <div>
                        <label>Catégorie *</label>
                        <select id="categoryId" required onchange="loadAttributeFields()"></select>
                    </div>
                    <div>
                        <label>Statut</label>
                        <div class="toggle-switch">
                            <input type="checkbox" id="productIsActive" checked>
                            <span>Produit actif (visible sur le site)</span>
                        </div>
                    </div>
                    <div class="full">
                        <label>Description courte *</label>
                        <input type="text" id="productShortDescription" placeholder="1-2 phrases résumant le produit">
                    </div>
                    <div class="full">
                        <label>Description longue</label>
                        <textarea id="productDescription" placeholder="Description détaillée du produit..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Prix & Stock -->
            <div class="form-section">
                <h3>💰 Prix & Stock</h3>
                <div class="form-grid">
                    <div>
                        <label>Prix de vente * (FCFA)</label>
                        <input type="number" id="productPrice" placeholder="Ex: 15000" required>
                    </div>
                    <div>
                        <label>Prix barré (FCFA)</label>
                        <input type="number" id="productOldPrice" placeholder="Ex: 20000">
                    </div>
                    <div>
                        <label>Stock *</label>
                        <input type="number" id="productStock" placeholder="Ex: 50" required>
                    </div>
                </div>
            </div>

            <!-- Image -->
            <div class="form-section">
                <h3>🖼️ Image</h3>
                <div class="form-grid">
                    <div>
                        <label>Image du produit</label>
                        <input type="file" id="imageFile" accept="image/*">
                    </div>
                    <div id="currentImageDiv" style="display:none;">
                        <label>Image actuelle</label>
                        <img id="currentImage" src="" width="80" style="border-radius:8px;">
                    </div>
                </div>
            </div>

            <!-- SEO -->
            <div class="form-section">
                <h3>🔍 SEO</h3>
                <div class="form-grid">
                    <div>
                        <label>Slug URL</label>
                        <input type="text" id="productSlug" placeholder="ex: chemise-homme-slim-bleu">
                    </div>
                    <div>
                        <label>Meta description</label>
                        <input type="text" id="productMetaDescription" placeholder="Description pour Google (160 caractères max)">
                    </div>
                </div>
            </div>

            <!-- Attributs dynamiques -->
            <div class="form-section" id="attributesSection" style="display:none;">
                <h3>🏷️ Attributs</h3>
                <div class="form-grid" id="attributeFields"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">✅ Enregistrer</button>
                <button type="button" id="resetBtn" class="btn-reset">🔄 Réinitialiser</button>
            </div>
        </form>

        <hr>

        <!-- Table produits -->
        <div class="table-wrap">
            <table border="1" cellpadding="8">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Prix</th>
                        <th>Ancien Prix</th>
                        <th>Stock</th>
                        <th>Catégorie</th>
                        <th>Statut</th>
                        <th>Image</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("adminToken");
        if (!token) window.location.href = "admin-login.html";

        function logout() {
            localStorage.removeItem("adminToken");
            window.location.href = "admin-login.html";
        }

        const API_BASE = "https://ranitaapi-production.up.railway.app/api";

        async function loadCategories() {
            const res = await fetch(`${API_BASE}/categories`);
            const parents = await res.json();
            const select = document.getElementById("categoryId");

            select.innerHTML = `<option value="">-- Choisir une catégorie --</option>`;
            parents.forEach(parent => {
                if (parent.children && parent.children.length > 0) {
                    select.innerHTML += `<optgroup label="📁 ${parent.name}">`;
                    parent.children.forEach(child => {
                        select.innerHTML += `<option value="${child.id}">${child.name}</option>`;
                    });
                    select.innerHTML += `</optgroup>`;
                } else {
                    select.innerHTML += `<option value="${parent.id}">📁 ${parent.name}</option>`;
                }
            });
        }

        async function loadAttributeFields() {
            const catId = document.getElementById("categoryId").value;
            const section = document.getElementById("attributesSection");
            const fields = document.getElementById("attributeFields");

            if (!catId) { section.style.display = "none"; return; }

            const res = await fetch(`${API_BASE}/category-attributes/${catId}`);
            const attrs = await res.json();

            if (attrs.length === 0) { section.style.display = "none"; return; }

            section.style.display = "block";
            fields.innerHTML = attrs.map(a => `
                <div class="attr-field">
                    <label>${a.attributeName}</label>
                    ${a.attributeType === 'select'
                    ? `<select id="attr_${a.attributeName}">
                            <option value="">-- Choisir --</option>
                            ${a.attributeOptions.split(',').map(o => `<option value="${o.trim()}">${o.trim()}</option>`).join('')}
                           </select>`
                    : `<input type="${a.attributeType === 'number' ? 'number' : 'text'}"
                                  id="attr_${a.attributeName}"
                                  placeholder="${a.attributeName}">`
                }
                </div>
            `).join('');
        }

        async function loadProducts() {
            const res = await fetch(`${API_BASE}/products`);
            const products = await res.json();
            const tbody = document.getElementById("productsTable");

            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${Number(p.price).toLocaleString()} FCFA</td>
                    <td>${p.oldPrice ? `<s>${Number(p.oldPrice).toLocaleString()} FCFA</s>` : "—"}</td>
                    <td>${p.stock}</td>
                    <td>${p.category?.name || "—"}</td>
                    <td>${p.isActive ? '✅ Actif' : '❌ Inactif'}</td>
                    <td>${p.imageUrl ? `<img src="${p.imageUrl}" width="60" style="border-radius:6px;">` : "—"}</td>
                    <td>
                        <button onclick="editProduct(${p.id})">✏️ Modifier</button>
                        <button onclick="deleteProduct(${p.id})">🗑️ Supprimer</button>
                    </td>
                </tr>
            `).join('');
        }

        let allProducts = [];

        async function editProduct(id) {
            const res = await fetch(`${API_BASE}/products/${id}`);
            const p = await res.json();

            document.getElementById("productId").value = p.id;
            document.getElementById("productName").value = p.name;
            document.getElementById("productBrand").value = p.brand || "";
            document.getElementById("productShortDescription").value = p.shortDescription || "";
            document.getElementById("productDescription").value = p.description || "";
            document.getElementById("productPrice").value = p.price;
            document.getElementById("productOldPrice").value = p.oldPrice || "";
            document.getElementById("productStock").value = p.stock;
            document.getElementById("productIsActive").checked = p.isActive;
            document.getElementById("productSlug").value = p.slug || "";
            document.getElementById("productMetaDescription").value = p.metaDescription || "";
            document.getElementById("categoryId").value = p.categoryId || "";
            document.getElementById("productSku").value = p.sku || "";

            if (p.imageUrl) {
                document.getElementById("currentImageDiv").style.display = "block";
                document.getElementById("currentImage").src = p.imageUrl;
            }

            await loadAttributeFields();

            // Remplir les attributs
            if (p.attributes && p.attributes !== "{}") {
                try {
                    const attrs = JSON.parse(p.attributes);
                    Object.keys(attrs).forEach(key => {
                        const el = document.getElementById(`attr_${key}`);
                        if (el) el.value = attrs[key];
                    });
                } catch (e) { }
            }

            window.scrollTo(0, 0);
        }

        async function deleteProduct(id) {
            if (!confirm("Supprimer ce produit ?")) return;
            await fetch(`${API_BASE}/products/${id}`, { method: "DELETE" });
            loadProducts();
        }

        document.getElementById("productForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            // Collecter les attributs
            const attrFields = document.querySelectorAll("[id^='attr_']");
            const attributes = {};
            attrFields.forEach(el => {
                const key = el.id.replace("attr_", "");
                if (el.value) attributes[key] = el.value;
            });

            const formData = new FormData();
            formData.append("Name", document.getElementById("productName").value);
            formData.append("Brand", document.getElementById("productBrand").value);
            formData.append("ShortDescription", document.getElementById("productShortDescription").value);
            formData.append("Description", document.getElementById("productDescription").value);
            formData.append("Price", document.getElementById("productPrice").value);
            formData.append("OldPrice", document.getElementById("productOldPrice").value || "");
            formData.append("Stock", document.getElementById("productStock").value);
            formData.append("IsActive", document.getElementById("productIsActive").checked);
            formData.append("Slug", document.getElementById("productSlug").value);
            formData.append("MetaDescription", document.getElementById("productMetaDescription").value);
            formData.append("CategoryId", document.getElementById("categoryId").value);
            formData.append("Attributes", JSON.stringify(attributes));
            formData.append("Sku", document.getElementById("productSku").value);

            const imageFile = document.getElementById("imageFile");
            if (imageFile.files.length > 0) {
                formData.append("image", imageFile.files[0]);
            }

            const id = document.getElementById("productId").value;
            const url = id ? `${API_BASE}/products/${id}` : `${API_BASE}/products`;
            const method = id ? "PUT" : "POST";

            const res = await fetch(url, { method, body: formData });

            if (!res.ok) {
                alert("Erreur : " + await res.text());
                return;
            }

            resetForm();
            loadProducts();
        });

        document.getElementById("categoryId").addEventListener("change", function () {
            if (!document.getElementById("productId").value) {
                const catText = this.options[this.selectedIndex]?.text || "PRD";
                const prefix = catText
                    .substring(0, 3)
                    .toUpperCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "");
                const random = Math.floor(1000 + Math.random() * 9000);
                document.getElementById("productSku").value = `RAN-${prefix}-${random}`;
            }
        });

        function resetForm() {
            document.getElementById("productForm").reset();
            document.getElementById("productId").value = "";
            document.getElementById("currentImageDiv").style.display = "none";
            document.getElementById("attributesSection").style.display = "none";
            document.getElementById("attributeFields").innerHTML = "";
            document.getElementById("productSku").value = "";

        }

        document.getElementById("resetBtn").addEventListener("click", resetForm);

        // Auto-générer le slug depuis le nom
        document.getElementById("productName").addEventListener("input", function () {
            const slug = this.value
                .toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9\s-]/g, "")
                .replace(/\s+/g, "-");
            document.getElementById("productSlug").value = slug;
        });

        loadCategories();
        loadProducts();
    </script>

</body>
</html>
