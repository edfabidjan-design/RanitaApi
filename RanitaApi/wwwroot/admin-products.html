<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita Admin - Produits</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>

    <header class="admin-header">
        <div class="logo" onclick="location.href='admin-dashboard.html'">
            🛒 Ranita Admin
        </div>

        <nav>
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="admin-products.html" class="active">Produits</a>
            <a href="admin-categories.html">Catégories</a>
            <a href="admin-orders.html">Commandes</a>
        </nav>

        <button onclick="logout()">Déconnexion</button>
    </header>

    <div class="admin-container">

        <h1>Gestion des produits</h1>

        <form id="productForm">
            <input type="hidden" id="productId" />

            <input type="text" id="productName" placeholder="Nom du produit" required />
            <input type="number" id="productPrice" placeholder="Prix" required />
            <input type="number" id="productStock" placeholder="Stock" required />
            <input type="file" id="imageFile" />
            <input type="text" id="productDescription" placeholder="Description" />

            <select id="categoryId" required></select>

            <button type="submit">Enregistrer</button>
            <button type="button" id="resetBtn">Réinitialiser</button>
        </form>

        <hr />

        <div class="table-wrap">
            <table border="1" cellpadding="8">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Prix</th>
                        <th>Stock</th>
                        <th>Catégorie</th>
                        <th>Image</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTable"></tbody>
            </table>

        </div>

    <script>
        const token = localStorage.getItem("adminToken");

        if (!token) {
            window.location.href = "admin-login.html";
        }

        function logout() {
            localStorage.removeItem("adminToken");
            window.location.href = "admin-login.html";
        }

        const API_BASE = "https://ranitaapi-production.up.railway.app/api";
        const productsApi = `${API_BASE}/products`;
        const categoriesApi = `${API_BASE}/categories`;

        const form = document.getElementById("productForm");
        const productId = document.getElementById("productId");
        const productName = document.getElementById("productName");
        const productPrice = document.getElementById("productPrice");
        const productStock = document.getElementById("productStock");
        const imageFile = document.getElementById("imageFile");
        const productDescription = document.getElementById("productDescription");
        const categoryId = document.getElementById("categoryId");
        const productsTable = document.getElementById("productsTable");
        const resetBtn = document.getElementById("resetBtn");

        async function loadCategories() {
            const res = await fetch(categoriesApi);
            const categories = await res.json();

            categoryId.innerHTML = `<option value="">-- Choisir une catégorie --</option>`;

            categories.forEach(c => {
                categoryId.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
        }

        async function loadProducts() {
            const res = await fetch(productsApi);
            const products = await res.json();

            productsTable.innerHTML = "";

            products.forEach(p => {
                const catName = p.categoryName || p.category?.name || "";

                productsTable.innerHTML += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${p.price}</td>
                    <td>${p.stock}</td>
                    <td>${catName}</td>
                    <td>${p.imageUrl ? `<img src="${p.imageUrl}" width="60" />` : ""}</td>
                    <td>
                        <button onclick="editProduct(${p.id}, '${escapeText(p.name)}', ${p.price}, '${escapeText(p.description || "")}', ${p.categoryId || 0}, ${p.stock})">Modifier</button>
                        <button onclick="deleteProduct(${p.id})">Supprimer</button>
                    </td>
                </tr>
            `;
            });
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append("Name", productName.value);
            formData.append("Price", productPrice.value);
            formData.append("Stock", productStock.value);
            formData.append("Description", productDescription.value);
            formData.append("CategoryId", categoryId.value);

            if (imageFile.files.length > 0) {
                formData.append("image", imageFile.files[0]);
            }

            const url = productId.value
                ? `${productsApi}/${productId.value}`
                : productsApi;

            const method = productId.value ? "PUT" : "POST";

            const res = await fetch(url, {
                method: method,
                body: formData
            });

            if (!res.ok) {
                const err = await res.text();
                alert("Erreur : " + err);
                return;
            }

            resetForm();
            loadProducts();
        });

        function editProduct(id, name, price, description, catId, stock) {
            productId.value = id;
            productName.value = name;
            productPrice.value = price;
            productStock.value = stock;
            productDescription.value = description;
            categoryId.value = catId;
        }

        async function deleteProduct(id) {
            if (!confirm("Supprimer ce produit ?")) return;

            await fetch(`${productsApi}/${id}`, {
                method: "DELETE"
            });

            loadProducts();
        }

        function resetForm() {
            productId.value = "";
            productName.value = "";
            productPrice.value = "";
            productDescription.value = "";
            categoryId.value = "";
            imageFile.value = "";
            productStock.value = "";
        }

        function escapeText(value) {
            return String(value).replaceAll("'", "\\'");
        }

        resetBtn.addEventListener("click", resetForm);

        loadCategories();
        loadProducts();
    </script>

</body>
</html>
