<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita Admin - Catégories</title>
    <link rel="stylesheet" href="admin-style.css">
    <script src="admin-notifications.js" defer></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <script src="admin-auth.js"></script>
</head>
<body>
    <header class="admin-header">
        <div class="logo" onclick="location.href='admin-dashboard.html'">🛒 Ranita Admin</div>
        <nav id="adminNav"></nav>
        <button class="btn-logout" onclick="adminLogout()">Déconnexion</button>
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
    </header>

    <div class="admin-container">
        <h1>Gestion des catégories</h1>
        <form id="categoryForm" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
            <input type="hidden" id="categoryId">
            <input type="text" id="categoryName" placeholder="Nom de la catégorie" required style="flex:1;padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;">
            <select id="categoryParent" style="padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;">
                <option value="">— Catégorie parente (optionnel) —</option>
            </select>
            <button type="submit" style="background:#10b981;color:white;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;">Enregistrer</button>
            <button type="button" id="resetBtn" style="background:#f3f4f6;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;">Réinitialiser</button>
        </form>
        <div id="categoriesTree"></div>
    </div>

    <script>
        checkPageAccess('categories');
        buildAdminNav('categories');
        applyReadOnlyMode();

        const API = "https://ranitaapi-production.up.railway.app/api/categories";

        async function loadCategories() {
            const res = await fetch(API);
            const parents = await res.json();
            const select = document.getElementById("categoryParent");
            const currentId = document.getElementById("categoryId").value;
            select.innerHTML = `<option value="">— Catégorie parente (optionnel) —</option>`;
            parents.forEach(p => { if (p.id != currentId) select.innerHTML += `<option value="${p.id}">${p.name}</option>`; });
            const tree = document.getElementById("categoriesTree");
            tree.innerHTML = "";
            parents.forEach(parent => {
                const card = document.createElement("div");
                card.style.cssText = "background:white;border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 4px 15px rgba(0,0,0,0.07);";
                card.innerHTML = `
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${parent.children?.length ? '12px' : '0'};flex-wrap:wrap;gap:8px;">
                                    <strong style="font-size:16px;">📁 ${parent.name}</strong>
                                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                                        <button onclick="editCategory(${parent.id},'${parent.name}','')" style="background:#f0fdf4;color:#059669;border:1px solid #10b981;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:600;">✏️</button>
                                        <button onclick="deleteCategory(${parent.id})" style="background:#fff0f0;color:#ef4444;border:1px solid #ef4444;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:600;">🗑️</button>
                                        <button onclick="addChild(${parent.id})" style="background:#eff6ff;color:#3b82f6;border:1px solid #3b82f6;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:600;">➕ Sous-cat</button>
                                    </div>
                                </div>
                                ${parent.children?.map(child => `
                                    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f9fafb;border-radius:10px;margin-top:8px;flex-wrap:wrap;gap:8px;">
                                        <span style="color:#374151;">　└── ${child.name}</span>
                                        <div style="display:flex;gap:8px;">
                                            <button onclick="editCategory(${child.id},'${child.name}',${child.parentId})" style="background:#f0fdf4;color:#059669;border:1px solid #10b981;padding:4px 10px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;">✏️</button>
                                            <button onclick="deleteCategory(${child.id})" style="background:#fff0f0;color:#ef4444;border:1px solid #ef4444;padding:4px 10px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;">🗑️</button>
                                        </div>
                                    </div>`).join("") || ""}`;
                tree.appendChild(card);
            });
        }

        function addChild(parentId) { document.getElementById("categoryId").value = ""; document.getElementById("categoryName").value = ""; document.getElementById("categoryParent").value = parentId; document.getElementById("categoryName").focus(); }
        function editCategory(id, name, parentId) { document.getElementById("categoryId").value = id; document.getElementById("categoryName").value = name; loadCategories().then(() => { document.getElementById("categoryParent").value = parentId || ""; }); document.getElementById("categoryName").focus(); }
        async function deleteCategory(id) { if (!confirm("Supprimer cette catégorie ?")) return; await fetch(`${API}/${id}`, { method: "DELETE" }); loadCategories(); }

        document.getElementById("categoryForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const id = document.getElementById("categoryId").value;
            const name = document.getElementById("categoryName").value;
            const parentId = document.getElementById("categoryParent").value;
            const data = { name, parentId: parentId ? parseInt(parentId) : null };
            if (id) await fetch(`${API}/${id}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
            else await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
            resetForm(); loadCategories();
        });

        function resetForm() { document.getElementById("categoryId").value = ""; document.getElementById("categoryName").value = ""; document.getElementById("categoryParent").value = ""; }
        document.getElementById("resetBtn").addEventListener("click", resetForm);
        loadCategories();
    </script>
    <div id="mobileNav"><div id="mobileNavLinks"></div><div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1);"><button onclick="adminLogout()" style="width:100%;background:#ef4444;color:white;border:none;padding:16px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">🚪 Déconnexion</button></div></div>
</body>
</html>
