<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita Admin - Commandes</title>
    <link rel="stylesheet" href="admin-style.css">
    <script src="admin-notifications.js" defer></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <script src="admin-auth.js"></script>
    <style>
        .status-badge {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-validated {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-delivered {
            background: #d1fae5;
            color: #065f46;
        }

        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-select {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

            .modal-overlay.open {
                display: flex;
            }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

            .modal h3 {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 16px;
                color: #111827;
            }

        .modal-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }

            .modal-item img {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 8px;
            }

        .modal-item-info {
            flex: 1;
        }

        .modal-item-name {
            font-size: 14px;
            font-weight: 600;
            color: #111827;
        }

        .modal-item-qty {
            font-size: 12px;
            color: #6b7280;
        }

        .modal-item-price {
            font-size: 14px;
            font-weight: 700;
            color: #10b981;
        }

        .modal-total {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 800;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 2px solid #f3f4f6;
        }

        .btn-close-modal {
            width: 100%;
            background: #f3f4f6;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            font-size: 14px;
        }

        .order-info {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 16px;
        }

            .order-info strong {
                color: #111827;
            }

        .stats-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: nowrap;
            overflow-x: auto;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 10px 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            flex: 1;
            min-width: 70px;
            text-align: center;
        }

            .stat-card .stat-num {
                font-size: 18px;
                font-weight: 800;
                color: #111827;
                white-space: nowrap;
            }

            .stat-card .stat-label {
                font-size: 10px;
                color: #6b7280;
                margin-top: 2px;
                white-space: nowrap;
            }

        .status-refund {
            background: #fef3c7;
            color: #92400e;
        }

        .status-refunded {
            background: #fee2e2;
            color: #991b1b;
        }

        @media(max-width:600px) {
            .stat-card .stat-num {
                font-size: 14px;
            }

            .stat-card .stat-label {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="logo" onclick="location.href='admin-dashboard.html'">🛒 Ranita Admin</div>
        <nav id="adminNav"></nav>
        <button class="btn-logout" onclick="adminLogout()">Déconnexion</button>
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
    </header>

    <div class="admin-container">
        <h1>📦 Gestion des commandes</h1>
        <div class="stats-bar" id="statsBar"></div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
            <span id="adminOrdersCount" style="font-size:14px;color:#6b7280;font-weight:600;"></span>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <input type="text" placeholder="🔍 Nom, téléphone, #ID..."
                       oninput="adminOrdersSearch=this.value;adminOrdersPage=1;renderOrders()"
                       style="padding:10px 14px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;width:220px;outline:none;">
                <select onchange="adminOrdersFilter=this.value;adminOrdersPage=1;renderOrders()"
                        style="padding:10px 14px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;cursor:pointer;">
                    <option value="">Tous les statuts</option>
                    <option value="En attente">En attente</option>
                    <option value="Validée">Validée</option>
                    <option value="Livrée">Livrée</option>
                    <option value="Annulée">Annulée</option>
                    <option value="Remboursement demandé">Remb. demandé</option>
                    <option value="Remboursé">Remboursé</option>
                </select>
            </div>
        </div>
        <div id="adminOrdersPaginationBar" style="display:flex;justify-content:center;gap:8px;margin:16px 0;flex-wrap:wrap;"></div>


        <div class="table-wrap">
            <table border="1" cellpadding="8">
                <thead>
                    <tr><th>#</th><th>Client</th><th>Téléphone</th><th>Adresse</th><th>Paiement</th><th>Total</th><th>Statut</th><th>Date</th><th>Détails</th></tr>
                </thead>
                <tbody id="ordersTable"></tbody>
            </table>
            <div id="adminOrdersPaginationBar" style="display:flex;justify-content:center;gap:8px;margin:16px 0;flex-wrap:wrap;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        checkPageAccess('orders');
        buildAdminNav('orders');
        applyReadOnlyMode();

        const API_BASE = "https://ranitaapi-production.up.railway.app/api";
        const { token } = getAdminInfo();

        function getStatusStyle(status) {
            const styles = {
                "En attente": "background:#fef3c7;color:#92400e;border-color:#f59e0b;",
                "Confirmée par vendeur": "background:#e0e7ff;color:#3730a3;border-color:#6366f1;",
                "Indisponible vendeur": "background:#fef3c7;color:#92400e;border-color:#f59e0b;",
                "Validée": "background:#dbeafe;color:#1e40af;border-color:#3b82f6;",
                "Livrée": "background:#d1fae5;color:#065f46;border-color:#10b981;",
                "Annulée": "background:#fee2e2;color:#991b1b;border-color:#ef4444;",
                "Remboursé": "background:#fee2e2;color:#991b1b;border-color:#ef4444;",
                "Remboursement rejeté": "background:#fee2e2;color:#991b1b;border-color:#ef4444;",
            };
            return styles[status] || "";
        }

        async function approveRefund(id) {
            if (!confirm("Valider le remboursement ?")) return;
            const res = await fetch(`${API_BASE}/orders/${id}/refund-approve`, { method: "POST" });
            if (!res.ok) { alert(await res.text()); return; }
            document.getElementById("modalOverlay").classList.remove("open");
            loadOrders();
        }

        async function rejectRefund(id) {
            if (!confirm("Rejeter la demande ?")) return;
            const res = await fetch(`${API_BASE}/orders/${id}/refund-reject`, { method: "POST" });
            if (!res.ok) { alert(await res.text()); return; }
            document.getElementById("modalOverlay").classList.remove("open");
            loadOrders();
        }

        let adminAllOrders = [];
        let adminOrdersPage = 1;
        const ORDERS_PAGE_SIZE = 20;
        let adminOrdersSearch = '';
        let adminOrdersFilter = '';

        async function loadOrders() {
            const res = await fetch(`${API_BASE}/orders`, { headers: { 'Authorization': `Bearer ${token}` } });
            adminAllOrders = await res.json();
            renderOrders();
        }

        function renderOrders() {
            const filtered = adminAllOrders.filter(o => {
                const matchSearch = !adminOrdersSearch ||
                    o.customerName.toLowerCase().includes(adminOrdersSearch.toLowerCase()) ||
                    o.customerPhone.includes(adminOrdersSearch) ||
                    String(o.id).includes(adminOrdersSearch);
                const matchFilter = !adminOrdersFilter || o.status === adminOrdersFilter;
                return matchSearch && matchFilter;
            });

            // Stats
            const stats = {
                total: adminAllOrders.length,
                attente: adminAllOrders.filter(o => o.status === "En attente").length,
                validee: adminAllOrders.filter(o => o.status === "Validée").length,
                livree: adminAllOrders.filter(o => o.status === "Livrée").length,
                ca: adminAllOrders.filter(o => !["Annulée", "Échec livraison", "Remboursé"].includes(o.status)).reduce((s, o) => s + o.total, 0)
            };
            document.getElementById("statsBar").innerHTML = `
        <div class="stat-card"><div class="stat-num">${stats.total}</div><div class="stat-label">Total</div></div>
        <div class="stat-card" style="border-top:3px solid #f59e0b;"><div class="stat-num">${stats.attente}</div><div class="stat-label">Attente</div></div>
        <div class="stat-card" style="border-top:3px solid #3b82f6;"><div class="stat-num">${stats.validee}</div><div class="stat-label">Validées</div></div>
        <div class="stat-card" style="border-top:3px solid #10b981;"><div class="stat-num">${stats.livree}</div><div class="stat-label">Livrées</div></div>
        <div class="stat-card" style="border-top:3px solid #ef4444;"><div class="stat-num">${adminAllOrders.filter(o => o.status === "Annulée").length}</div><div class="stat-label">Annulées</div></div>
        <div class="stat-card" style="border-top:3px solid #ef4444;"><div class="stat-num">${adminAllOrders.filter(o => o.status === "Remboursé").length}</div><div class="stat-label">Remb.</div></div>
        <div class="stat-card" style="border-top:3px solid #f59e0b;"><div class="stat-num">${adminAllOrders.filter(o => o.status === "Remboursement demandé").length}</div><div class="stat-label">Remb.dem.</div></div>
        <div class="stat-card" style="border-top:3px solid #8b5cf6;"><div class="stat-num" style="font-size:13px;">${Number(stats.ca).toLocaleString()} F</div><div class="stat-label">CA</div></div>`;

            // Pagination
            const totalPages = Math.ceil(filtered.length / ORDERS_PAGE_SIZE);
            if (adminOrdersPage > totalPages) adminOrdersPage = 1;
            const paginated = filtered.slice(
                (adminOrdersPage - 1) * ORDERS_PAGE_SIZE,
                adminOrdersPage * ORDERS_PAGE_SIZE
            );

            // Compteur
            document.getElementById('adminOrdersCount').textContent =
                filtered.length + ' commande' + (filtered.length !== 1 ? 's' : '') +
                (totalPages > 1 ? ' — Page ' + adminOrdersPage + '/' + totalPages : '');

            window._adminOrders = adminAllOrders;

            // Tableau
            document.getElementById("ordersTable").innerHTML = paginated.map(o => `
        <tr>
            <td><strong>#${o.id}</strong></td>
            <td>${o.customerName}</td>
            <td>${o.customerPhone}</td>
            <td style="max-width:150px;font-size:12px;">${o.customerAddress}</td>
            <td>${o.paymentMethod}</td>
            <td><strong>${Number(o.total).toLocaleString()} FCFA</strong></td>
            <td>
                ${o.status === "Remboursement demandé" ? `
                <div style="display:flex;flex-direction:column;gap:6px;">
                    <span class="status-badge status-refund">💰 Remb. demandé</span>
                    <button onclick="approveRefund(${o.id})" style="background:#10b981;color:white;border:none;padding:6px 10px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px;">✅ Valider</button>
                    <button onclick="rejectRefund(${o.id})" style="background:#ef4444;color:white;border:none;padding:6px 10px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px;">❌ Rejeter</button>
                </div>` : `
                <select class="status-select" style="${getStatusStyle(o.status)}" onchange="updateStatus(${o.id},this.value,this)">
                    <option ${o.status === "En attente" ? "selected" : ""}>En attente</option>
                    <option ${o.status === "Confirmée par vendeur" ? "selected" : ""}>Confirmée par vendeur</option>
                    <option ${o.status === "Indisponible vendeur" ? "selected" : ""}>Indisponible vendeur</option>
                    <option ${o.status === "Validée" ? "selected" : ""}>Validée</option>
                    <option ${o.status === "Livrée" ? "selected" : ""}>Livrée</option>
                    <option ${o.status === "Annulée" ? "selected" : ""}>Annulée</option>
                    <option ${o.status === "Échec livraison" ? "selected" : ""}>Échec livraison</option>
                    <option ${o.status === "Remboursé" ? "selected" : ""}>Remboursé</option>
                    <option ${o.status === "Remboursement rejeté" ? "selected" : ""}>Remboursement rejeté</option>
                </select>
                ${o.status === "Confirmée par vendeur" ? `<div style="margin-top:4px;background:#e0e7ff;color:#3730a3;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;">✅ Prêt à livrer !</div>` : ''}
                ${(o.status === "Annulée" || o.status === "Indisponible vendeur") && o.refundMotif ? `<div style="margin-top:4px;background:#fef3c7;color:#92400e;padding:4px 8px;border-radius:6px;font-size:11px;">${o.refundMotif}</div>` : ''}`}
            </td>
            <td style="font-size:12px;">${new Date(o.createdAt).toLocaleString('fr-FR')}</td>
            <td><button onclick="showDetails(${o.id})">👁 Voir</button></td>
        </tr>`).join('');

            // Barre pagination
            var bar = document.getElementById('adminOrdersPaginationBar');
            if (totalPages <= 1) { bar.innerHTML = ''; return; }
            var pages = [];
            pages.push('<button onclick="ordersGoPage(' + (adminOrdersPage - 1) + ')" ' + (adminOrdersPage === 1 ? 'disabled' : '') + ' style="padding:8px 14px;border-radius:8px;border:1px solid #e5e7eb;background:white;font-weight:700;cursor:pointer;' + (adminOrdersPage === 1 ? 'opacity:.4;' : '') + '">&larr; Préc</button>');
            for (var i = 1; i <= totalPages; i++) {
                var isActive = adminOrdersPage === i;
                if (i === 1 || i === totalPages || (i >= adminOrdersPage - 1 && i <= adminOrdersPage + 1)) {
                    pages.push('<button onclick="ordersGoPage(' + i + ')" style="padding:8px 14px;border-radius:8px;border:1px solid ' + (isActive ? '#10b981' : '#e5e7eb') + ';background:' + (isActive ? '#10b981' : 'white') + ';color:' + (isActive ? 'white' : '#374151') + ';font-weight:700;cursor:pointer;">' + i + '</button>');
                } else if (i === adminOrdersPage - 2 || i === adminOrdersPage + 2) {
                    pages.push('<span style="padding:8px 4px;color:#9ca3af;">...</span>');
                }
            }
            pages.push('<button onclick="ordersGoPage(' + (adminOrdersPage + 1) + ')" ' + (adminOrdersPage === totalPages ? 'disabled' : '') + ' style="padding:8px 14px;border-radius:8px;border:1px solid #e5e7eb;background:white;font-weight:700;cursor:pointer;' + (adminOrdersPage === totalPages ? 'opacity:.4;' : '') + ' ">Suiv &rarr;</button>');
            bar.innerHTML = pages.join('');
        }

        function ordersGoPage(p) {
            var total = Math.ceil(adminAllOrders.length / ORDERS_PAGE_SIZE);
            if (p < 1 || p > total) return;
            adminOrdersPage = p;
            renderOrders();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function updateStatus(id, status, selectEl) {
            const res = await fetch(`${API_BASE}/orders/${id}/status`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ status }) });
            if (!res.ok) { alert("Erreur changement statut"); return; }
            selectEl.style.cssText = getStatusStyle(status);
            loadOrders();
        }

        function showDetails(orderId) {
            const o = window._adminOrders.find(o => o.id === orderId); if (!o) return;
            const subtotal = o.items.reduce((s, i) => s + i.price * i.quantity, 0);
            document.getElementById("modalContent").innerHTML = `
                            <h3>Commande #${o.id}</h3>
                            <div class="order-info"><strong>Client :</strong> ${o.customerName}<br><strong>Téléphone :</strong> ${o.customerPhone}<br><strong>Adresse :</strong> ${o.customerAddress}<br><strong>Paiement :</strong> ${o.paymentMethod}<br><strong>Date :</strong> ${new Date(o.createdAt).toLocaleString('fr-FR')}</div>
                            ${o.refundMotif ? `<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:12px;"><strong style="color:#92400e;">💰 Motif :</strong><p style="margin-top:4px;font-size:13px;">${o.refundMotif}</p></div>` : ''}
                            ${o.items.map(i => `<div class="modal-item"><img src="${i.imageUrl || 'https://via.placeholder.com/50'}" alt="${i.productName}"><div class="modal-item-info"><div class="modal-item-name">${i.productName}</div><div class="modal-item-qty">x${i.quantity}${i.variantName ? ` · ${i.variantName}` : ''}</div></div><div class="modal-item-price">${Number(i.price * i.quantity).toLocaleString()} FCFA</div></div>`).join('')}
                            <div class="modal-total"><span>Sous-total</span><span>${Number(subtotal).toLocaleString()} FCFA</span></div>
                            <div class="modal-total"><span>Total payé</span><span style="color:#10b981;">${Number(o.total).toLocaleString()} FCFA</span></div>
                            <button class="btn-close-modal" onclick="document.getElementById('modalOverlay').classList.remove('open')">Fermer</button>`;
            document.getElementById("modalOverlay").classList.add("open");
        }

        function closeModal(e) { if (e.target === document.getElementById("modalOverlay")) document.getElementById("modalOverlay").classList.remove("open"); }

        loadOrders();
    </script>
    <div id="mobileNav"><div id="mobileNavLinks"></div><div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1);"><button onclick="adminLogout()" style="width:100%;background:#ef4444;color:white;border:none;padding:16px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">🚪 Déconnexion</button></div></div>
</body>
</html>
