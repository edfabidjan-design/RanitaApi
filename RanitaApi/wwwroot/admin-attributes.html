<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita Admin - Attributs</title>
    <link rel="stylesheet" href="admin-style.css">
    <script src="admin-notifications.js" defer></script>
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#10b981"></head>
<body>

    <header class="admin-header">
        <div class="logo" onclick="location.href='admin-dashboard.html'">?? Ranita Admin</div>
        <nav>
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="admin-products.html">Produits</a>
            <a href="admin-categories.html">Catégories</a>
            <a href="admin-attributes.html" class="active">Attributs</a>
            <a href="admin-orders.html">Commandes</a>
            <a href="admin-clients.html">Clients</a>
            <a href="admin-reviews.html">? Avis</a>
        </nav>
        <button onclick="logout()">Déconnexion</button>
    </header>

    <div class="admin-container">
        <h1>Gestion des attributs</h1>

        <!-- Sélecteur de catégorie -->
        <div style="margin-bottom:24px;">
            <label style="font-weight:700;font-size:15px;display:block;margin-bottom:8px;">
                Choisir une catégorie :
            </label>
            <select id="selectedCategory" onchange="loadAttributes()"
                    style="padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;width:100%;max-width:400px;">
                <option value="">-- Sélectionner une catégorie --</option>
            </select>
        </div>

        <!-- Formulaire ajout attribut -->
        <div id="formSection" style="display:none;">
            <form id="attributeForm" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;background:white;padding:20px;border-radius:14px;box-shadow:0 4px 15px rgba(0,0,0,0.07);">
                <input type="hidden" id="attributeId">

                <input type="text" id="attributeName" placeholder="Nom de l'attribut (ex: RAM, Taille...)" required
                       style="flex:1;min-width:200px;padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;">

                <select id="attributeType" onchange="toggleOptions()"
                        style="padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;">
                    <option value="text">Texte libre</option>
                    <option value="number">Nombre</option>
                    <option value="select">Liste de choix</option>
                </select>

                <input type="text" id="attributeOptions" placeholder="Options séparées par virgule (ex: S,M,L,XL)"
                       style="display:none;flex:1;min-width:200px;padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;">

                <button type="submit"
                        style="background:#10b981;color:white;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;">
                    Enregistrer
                </button>
                <button type="button" onclick="resetForm()"
                        style="background:#f3f4f6;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;">
                    Réinitialiser
                </button>
            </form>

            <!-- Liste des attributs -->
            <div id="attributesList"></div>
        </div>
    </div>

    <script>
    const token = localStorage.getItem("adminToken");
    if (!token) window.location.href = "admin-login.html";

    function logout() {
        localStorage.removeItem("adminToken");
        window.location.href = "admin-login.html";
    }

    const API = "https://ranitaapi-production.up.railway.app/api";

    // Charger les catégories dans le select
    async function loadCategories() {
        const res = await fetch(`${API}/categories`);
        const parents = await res.json();
        const select = document.getElementById("selectedCategory");

        parents.forEach(parent => {
            if (parent.children && parent.children.length > 0) {
                select.innerHTML += `<optgroup label="?? ${parent.name}">`;
                parent.children.forEach(child => {
                    select.innerHTML += `<option value="${child.id}">${child.name}</option>`;
                });
                select.innerHTML += `</optgroup>`;
            } else {
                select.innerHTML += `<option value="${parent.id}">?? ${parent.name}</option>`;
            }
        });
    }

    // Charger les attributs de la catégorie sélectionnée
    async function loadAttributes() {
        const categoryId = document.getElementById("selectedCategory").value;
        if (!categoryId) {
            document.getElementById("formSection").style.display = "none";
            return;
        }

        document.getElementById("formSection").style.display = "block";

        const res = await fetch(`${API}/category-attributes/${categoryId}`);
        const attrs = await res.json();

        const list = document.getElementById("attributesList");

        if (attrs.length === 0) {
            list.innerHTML = `<p style="color:#6b7280;text-align:center;padding:20px;">Aucun attribut pour cette catégorie.</p>`;
            return;
        }

        list.innerHTML = `
            <table style="width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.07);">
                <thead>
                    <tr style="background:#f9fafb;">
                        <th style="padding:12px 16px;text-align:left;">Attribut</th>
                        <th style="padding:12px 16px;text-align:left;">Type</th>
                        <th style="padding:12px 16px;text-align:left;">Options</th>
                        <th style="padding:12px 16px;text-align:left;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    ${attrs.map(a => `
                        <tr style="border-top:1px solid #f3f4f6;">
                            <td style="padding:12px 16px;font-weight:600;">${a.attributeName}</td>
                            <td style="padding:12px 16px;">
                                <span style="background:#eff6ff;color:#3b82f6;padding:4px 10px;border-radius:999px;font-size:13px;font-weight:600;">
                                    ${a.attributeType === 'text' ? 'Texte' : a.attributeType === 'number' ? 'Nombre' : 'Liste'}
                                </span>
                            </td>
                            <td style="padding:12px 16px;color:#6b7280;font-size:13px;">
                                ${a.attributeOptions || '—'}
                            </td>
                            <td style="padding:12px 16px;">
                                <button onclick="editAttribute(${a.id}, '${a.attributeName}', '${a.attributeType}', '${a.attributeOptions}')"
                                        style="background:#f0fdf4;color:#059669;border:1px solid #10b981;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:600;margin-right:6px;">
                                    ?? Modifier
                                </button>
                                <button onclick="deleteAttribute(${a.id})"
                                        style="background:#fff0f0;color:#ef4444;border:1px solid #ef4444;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:600;">
                                    ??? Supprimer
                                </button>
                            </td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        `;
    }

    function toggleOptions() {
        const type = document.getElementById("attributeType").value;
        const options = document.getElementById("attributeOptions");
        options.style.display = type === "select" ? "block" : "none";
    }

    function editAttribute(id, name, type, options) {
        document.getElementById("attributeId").value = id;
        document.getElementById("attributeName").value = name;
        document.getElementById("attributeType").value = type;
        document.getElementById("attributeOptions").value = options;
        toggleOptions();
        document.getElementById("attributeName").focus();
    }

    async function deleteAttribute(id) {
        if (!confirm("Supprimer cet attribut ?")) return;
        await fetch(`${API}/category-attributes/${id}`, { method: "DELETE" });
        loadAttributes();
    }

    document.getElementById("attributeForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const categoryId = document.getElementById("selectedCategory").value;
        const id = document.getElementById("attributeId").value;
        const data = {
            categoryId: parseInt(categoryId),
            attributeName: document.getElementById("attributeName").value,
            attributeType: document.getElementById("attributeType").value,
            attributeOptions: document.getElementById("attributeOptions").value
        };

        if (id) {
            await fetch(`${API}/category-attributes/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
        } else {
            await fetch(`${API}/category-attributes`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
        }

        resetForm();
        loadAttributes();
    });

    function resetForm() {
        document.getElementById("attributeId").value = "";
        document.getElementById("attributeName").value = "";
        document.getElementById("attributeType").value = "text";
        document.getElementById("attributeOptions").value = "";
        document.getElementById("attributeOptions").style.display = "none";
    }

    loadCategories();
    </script>

</body>
</html>
