<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Admins — Ranita</title>
    <link rel="stylesheet" href="admin-style.css">
    <style>
        :root {
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
            --blue: #3b82f6;
            --purple: #7c3aed;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

            .modal-overlay.open {
                display: flex;
            }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

            .modal h3 {
                font-size: 18px;
                font-weight: 800;
                margin-bottom: 20px;
            }

        .form-group {
            margin-bottom: 16px;
        }

            .form-group label {
                display: block;
                font-size: 12px;
                font-weight: 700;
                color: var(--gray-700);
                margin-bottom: 6px;
                text-transform: uppercase;
                letter-spacing: 0.4px;
            }

            .form-group input, .form-group select {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid var(--gray-200);
                border-radius: 10px;
                font-size: 14px;
                outline: none;
                transition: border-color 0.2s;
                box-sizing: border-box;
            }

                .form-group input:focus, .form-group select:focus {
                    border-color: var(--green);
                }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-cancel {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            background: #f9fafb;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: var(--gray-700);
        }

        .btn-save {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            background: var(--green);
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

            .btn-save:hover {
                background: #059669;
            }

        /* ── TABLE ── */
        .admins-table {
            width: 100%;
            border-collapse: collapse;
        }

            .admins-table th {
                background: var(--gray-900);
                color: white;
                padding: 12px 14px;
                text-align: left;
                font-size: 13px;
            }

            .admins-table td {
                padding: 14px;
                border-bottom: 1px solid var(--gray-100);
                font-size: 14px;
                vertical-align: middle;
            }

            .admins-table tr:hover td {
                background: #f9fafb;
            }

            .admins-table tr:last-child td {
                border-bottom: none;
            }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .status-active {
            background: #d1fae5;
            color: #065f46;
        }

        .status-suspended {
            background: #fee2e2;
            color: #991b1b;
        }

        .action-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

            .btn-action:hover {
                opacity: 0.85;
            }

        .btn-edit {
            background: #dbeafe;
            color: #1e40af;
        }

        .btn-toggle-suspend {
            background: #fef3c7;
            color: #92400e;
        }

        .btn-toggle-activate {
            background: #d1fae5;
            color: #065f46;
        }

        .btn-pwd {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-delete {
            background: #fee2e2;
            color: #991b1b;
        }

        /* ── STATS ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

            .stat-box .val {
                font-size: 28px;
                font-weight: 800;
            }

            .stat-box .lbl {
                font-size: 12px;
                color: var(--gray-500);
                margin-top: 4px;
            }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            background: var(--gray-900);
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
        }

            .toast.show {
                transform: translateY(0);
                opacity: 1;
            }

            .toast.success {
                background: var(--green);
            }

            .toast.error {
                background: var(--red);
            }

        .current-user-row td {
            background: #f0fdf4 !important;
        }

        @media (max-width: 768px) {
            .admins-table {
                display: block;
                overflow-x: auto;
            }

            .action-btns {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <div class="logo" onclick="location.href='admin-dashboard.html'">🛒 Ranita Admin</div>
        <nav id="adminNav"></nav>
        <button onclick="adminLogout()">Déconnexion</button>
    </header>

    <div class="admin-container">

        <div class="page-header">
            <h1>👑 Gestion des administrateurs</h1>
            <button onclick="openCreateModal()" style="background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;">
                + Créer un admin
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-box"><div class="val" id="stat-total">—</div><div class="lbl">Total admins</div></div>
            <div class="stat-box"><div class="val" style="color:#10b981;" id="stat-active">—</div><div class="lbl">Actifs</div></div>
            <div class="stat-box"><div class="val" style="color:#ef4444;" id="stat-suspended">—</div><div class="lbl">Suspendus</div></div>
            <div class="stat-box"><div class="val" style="color:#7c3aed;" id="stat-superadmin">—</div><div class="lbl">Super Admins</div></div>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table class="admins-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Utilisateur</th>
                        <th>Email</th>
                        <th>Rôle</th>
                        <th>Statut</th>
                        <th>Créé le</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminsTableBody">
                    <tr><td colspan="7" style="text-align:center;padding:30px;color:#6b7280;">Chargement...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- Modal créer/modifier admin -->
    <div class="modal-overlay" id="modalAdmin">
        <div class="modal">
            <h3 id="modalTitle">Créer un administrateur</h3>
            <input type="hidden" id="editAdminId">
            <div class="form-group">
                <label>Nom d'utilisateur *</label>
                <input type="text" id="adminUsername" placeholder="ex: fatou_admin">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="adminEmail" placeholder="ex: fatou@ranita.com">
            </div>
            <div class="form-group" id="passwordGroup">
                <label>Mot de passe *</label>
                <input type="password" id="adminPassword" placeholder="Min. 6 caractères">
            </div>
            <div class="form-group">
                <label>Rôle *</label>
                <select id="adminRole">
                    <option value="SuperAdmin">👑 Super Admin</option>
                    <option value="GestionnaireCommandes">🧾 Gestionnaire Commandes</option>
                    <option value="GestionnaireVendeurs">🏪 Gestionnaire Vendeurs</option>
                    <option value="GestionnaireProduits">📦 Gestionnaire Produits</option>
                    <option value="GestionnairePaiements">💸 Gestionnaire Paiements</option>
                    <option value="GestionnaireClients">👥 Gestionnaire Clients</option>
                    <option value="ModerateurAvis">⭐ Modérateur Avis</option>
                    <option value="GestionnaireLivraisons">🚚 Gestionnaire Livraisons</option>
                    <option value="GestionnaireParametres">⚙️ Gestionnaire Paramètres</option>
                    <option value="Analyste" selected>📊 Analyste</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Annuler</button>
                <button class="btn-save" id="btnSaveAdmin" onclick="saveAdmin()">Créer</button>
            </div>
        </div>
    </div>

    <!-- Modal changer mot de passe -->
    <div class="modal-overlay" id="modalPassword">
        <div class="modal" style="max-width:380px;">
            <h3>🔑 Changer le mot de passe</h3>
            <input type="hidden" id="pwdAdminId">
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" id="newPassword" placeholder="Min. 6 caractères">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closePasswordModal()">Annuler</button>
                <button class="btn-save" onclick="savePassword()">Enregistrer</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="admin-auth.js"></script>
    <script>
        const API = 'https://ranitaapi-production.up.railway.app/api';
        const { token, role, name } = getAdminInfo();

        // Vérifier accès SuperAdmin uniquement
        if (!token) { window.location.href = 'admin-login.html'; }
        if (role !== 'SuperAdmin') {
            alert('Accès réservé au Super Admin.');
            window.location.href = 'admin-dashboard.html';
        }

        buildAdminNav('users');

        const ROLE_COLORS = {
            SuperAdmin: '#7c3aed', GestionnaireCommandes: '#2563eb',
            GestionnaireVendeurs: '#059669', GestionnaireProduits: '#0891b2',
            GestionnairePaiements: '#65a30d', GestionnaireClients: '#d97706',
            ModerateurAvis: '#f59e0b', GestionnaireLivraisons: '#6366f1',
            GestionnaireParametres: '#64748b', Analyste: '#6b7280'
        };

        const ROLE_LABELS = {
            SuperAdmin: '👑 Super Admin', GestionnaireCommandes: '🧾 Gest. Commandes',
            GestionnaireVendeurs: '🏪 Gest. Vendeurs', GestionnaireProduits: '📦 Gest. Produits',
            GestionnairePaiements: '💸 Gest. Paiements', GestionnaireClients: '👥 Gest. Clients',
            ModerateurAvis: '⭐ Modérateur Avis', GestionnaireLivraisons: '🚚 Gest. Livraisons',
            GestionnaireParametres: '⚙️ Gest. Paramètres', Analyste: '📊 Analyste'
        };

        // ── CHARGER ADMINS ────────────────────────────────────────────────────
        async function loadAdmins() {
            try {
                const res = await fetch(`${API}/admins`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) return;
                const admins = await res.json();

                // Stats
                document.getElementById('stat-total').textContent = admins.length;
                document.getElementById('stat-active').textContent = admins.filter(a => a.isActive).length;
                document.getElementById('stat-suspended').textContent = admins.filter(a => !a.isActive).length;
                document.getElementById('stat-superadmin').textContent = admins.filter(a => a.role === 'SuperAdmin').length;

                const tbody = document.getElementById('adminsTableBody');
                if (!admins.length) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#6b7280;">Aucun admin</td></tr>';
                    return;
                }

                tbody.innerHTML = admins.map(a => {
                    const color = ROLE_COLORS[a.role] || '#6b7280';
                    const label = ROLE_LABELS[a.role] || a.role;
                    const isMe = a.username === name;
                    return `
                    <tr ${isMe ? 'class="current-user-row"' : ''}>
                        <td><strong>#${a.id}</strong>${isMe ? ' <span style="font-size:11px;color:#10b981;font-weight:700;">(vous)</span>' : ''}</td>
                        <td>
                            <div style="font-weight:700;">${a.username}</div>
                            ${a.createdBy ? `<div style="font-size:11px;color:#6b7280;">Créé par: ${a.createdBy}</div>` : ''}
                        </td>
                        <td style="color:#6b7280;font-size:13px;">${a.email || '—'}</td>
                        <td>
                            <span class="role-badge" style="background:${color}22;color:${color};border:1px solid ${color}44;">
                                ${label}
                            </span>
                        </td>
                        <td>
                            <span class="status-badge ${a.isActive ? 'status-active' : 'status-suspended'}">
                                ${a.isActive ? '✅ Actif' : '⏸️ Suspendu'}
                            </span>
                        </td>
                        <td style="font-size:12px;color:#6b7280;">${new Date(a.createdAt).toLocaleDateString('fr-FR')}</td>
                        <td>
                            <div class="action-btns">
                                ${!isMe ? `
                                <button class="btn-action btn-edit" onclick="openEditModal(${a.id},'${a.username}','${a.email||''}','${a.role}')">✏️ Rôle</button>
                                <button class="btn-action ${a.isActive ? 'btn-toggle-suspend' : 'btn-toggle-activate'}" onclick="toggleAdmin(${a.id})">${a.isActive ? '⏸️ Suspendre' : '▶️ Activer'}</button>
                                <button class="btn-action btn-pwd" onclick="openPasswordModal(${a.id})">🔑 MDP</button>
                                <button class="btn-action btn-delete" onclick="deleteAdmin(${a.id},'${a.username}')">🗑️</button>
                                ` : '<span style="font-size:12px;color:#6b7280;">Compte actuel</span>'}
                            </div>
                        </td>
                    </tr>`;
                }).join('');
            } catch(e) { console.error(e); }
        }

        // ── CRÉER ADMIN ───────────────────────────────────────────────────────
        function openCreateModal() {
            document.getElementById('editAdminId').value = '';
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminRole').value = 'Analyste';
            document.getElementById('modalTitle').textContent = 'Créer un administrateur';
            document.getElementById('btnSaveAdmin').textContent = 'Créer';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('modalAdmin').classList.add('open');
        }

        function openEditModal(id, username, email, role) {
            document.getElementById('editAdminId').value = id;
            document.getElementById('adminUsername').value = username;
            document.getElementById('adminEmail').value = email;
            document.getElementById('adminRole').value = role;
            document.getElementById('modalTitle').textContent = 'Modifier le rôle';
            document.getElementById('btnSaveAdmin').textContent = 'Enregistrer';
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('modalAdmin').classList.add('open');
        }

        function closeModal() { document.getElementById('modalAdmin').classList.remove('open'); }

        async function saveAdmin() {
            const id = document.getElementById('editAdminId').value;
            const username = document.getElementById('adminUsername').value.trim();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const role = document.getElementById('adminRole').value;

            if (id) {
                // Modifier le rôle uniquement
                const res = await fetch(`${API}/admins/${id}/role`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ role })
                });
                if (res.ok) { showToast('Rôle mis à jour ✓', 'success'); closeModal(); loadAdmins(); }
                else { const d = await res.json(); showToast(d.message || 'Erreur', 'error'); }
            } else {
                // Créer un nouvel admin
                if (!username || !password) { showToast('Remplissez tous les champs obligatoires', 'error'); return; }
                const res = await fetch(`${API}/admins`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ username, email, password, role, createdBy: name })
                });
                if (res.ok) { showToast('Admin créé ✓', 'success'); closeModal(); loadAdmins(); }
                else { const d = await res.json(); showToast(d.message || 'Erreur', 'error'); }
            }
        }

        // ── TOGGLE SUSPEND ────────────────────────────────────────────────────
        async function toggleAdmin(id) {
            const res = await fetch(`${API}/admins/${id}/toggle`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) { const d = await res.json(); showToast(d.message, 'success'); loadAdmins(); }
            else showToast('Erreur', 'error');
        }

        // ── MOT DE PASSE ──────────────────────────────────────────────────────
        function openPasswordModal(id) {
            document.getElementById('pwdAdminId').value = id;
            document.getElementById('newPassword').value = '';
            document.getElementById('modalPassword').classList.add('open');
        }
        function closePasswordModal() { document.getElementById('modalPassword').classList.remove('open'); }

        async function savePassword() {
            const id = document.getElementById('pwdAdminId').value;
            const newPassword = document.getElementById('newPassword').value;
            if (!newPassword || newPassword.length < 6) { showToast('Mot de passe trop court (min 6 car.)', 'error'); return; }
            const res = await fetch(`${API}/admins/${id}/password`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ newPassword })
            });
            if (res.ok) { showToast('Mot de passe mis à jour ✓', 'success'); closePasswordModal(); }
            else showToast('Erreur', 'error');
        }

        // ── SUPPRIMER ─────────────────────────────────────────────────────────
        async function deleteAdmin(id, username) {
            if (!confirm(`Supprimer l'admin "${username}" ? Cette action est irréversible.`)) return;
            const res = await fetch(`${API}/admins/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) { showToast('Admin supprimé ✓', 'success'); loadAdmins(); }
            else { const d = await res.json(); showToast(d.message || 'Erreur', 'error'); }
        }

        // ── TOAST ─────────────────────────────────────────────────────────────
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast show ' + type;
            setTimeout(() => { t.className = 'toast'; }, 3500);
        }

        // Fermer modal au clic extérieur
        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
        });

        loadAdmins();
    </script>
</body>
</html>
