<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ranita Admin - Dashboard</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>

    <header class="admin-header">
        <div class="logo">🛒 Ranita Admin</div>

        <nav>
            <a href="admin-dashboard.html" class="active">Dashboard</a>
            <a href="admin-products.html">Produits</a>
            <a href="admin-categories.html">Catégories</a>
            <a href="admin-orders.html">Commandes</a>
        </nav>

        <button onclick="logout()">Déconnexion</button>
    </header>

    <div class="admin-container">

        <h1>Dashboard</h1>
        <p>Bienvenue dans l’espace administration Ranita</p>

        <div class="cards">
            <a href="admin-products.html" class="card">📦 Produits</a>
            <a href="admin-categories.html" class="card">📁 Catégories</a>
            <a href="admin-orders.html" class="card">🧾 Commandes</a>
        </div>

    </div>

    <script>
        const token = localStorage.getItem("adminToken");

        if (!token) {
            window.location.href = "admin-login.html";
        }

        function logout() {
            localStorage.removeItem("adminToken");
            window.location.href = "admin-login.html";
        }
    </script>

</body>
</html>
