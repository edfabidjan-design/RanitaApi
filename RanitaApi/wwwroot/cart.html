<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita - Panier</title>
    <link rel="stylesheet" href="products.css">
</head>
<body>

    <header class="site-header">
        <div class="site-logo" onclick="location.href='index.html'">🛒 Ranita Market</div>
        <nav>
            <a href="products.html">Produits</a>
            <a href="cart.html">Panier</a>
        </nav>
    </header>

    <main class="cart-page">
        <h1>Mon panier</h1>

        <div id="cartContainer"></div>

        <div class="cart-summary">
            <h2 id="totalAmount">Total : 0 FCFA</h2>

            <a href="checkout.html" class="cart-link">Passer la commande</a>
            <button onclick="clearCart()" class="btn-danger">Vider le panier</button>
            <a href="products.html" class="secondary-link">Continuer les achats</a>
        </div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        const cartContainer = document.getElementById("cartContainer");
        const totalAmount = document.getElementById("totalAmount");

        function renderCart() {
            cartContainer.innerHTML = "";

            if (cart.length === 0) {
                cartContainer.innerHTML = `<div class="empty-card"><p>Votre panier est vide.</p></div>`;
                totalAmount.textContent = "Total : 0 FCFA";
                return;
            }

            let total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;

                cartContainer.innerHTML += `
                <div class="cart-item">
                    <img src="${item.imageUrl ? item.imageUrl.replace('/upload/', '/upload/w_120,h_120,c_fill,q_auto,f_auto/') : 'https://via.placeholder.com/120'}" alt="${item.name}">

                    <div class="cart-info">
                        <h3>${item.name}</h3>
                        <p>${Number(item.price).toLocaleString()} FCFA</p>
                        <p>Sous-total : ${Number(item.price * item.quantity).toLocaleString()} FCFA</p>
                    </div>

                    <div class="qty-actions">
                        <button onclick="changeQty(${item.id}, -1)">-</button>
                        <strong>${item.quantity}</strong>
                        <button onclick="changeQty(${item.id}, 1)">+</button>
                    </div>

                    <button onclick="removeItem(${item.id})" class="btn-danger">Supprimer</button>
                </div>
            `;
            });

            totalAmount.textContent = "Total : " + Number(total).toLocaleString() + " FCFA";
        }

        function changeQty(id, delta) {
            const item = cart.find(p => p.id === id);
            if (!item) return;

            item.quantity += delta;

            if (item.quantity <= 0) {
                cart = cart.filter(p => p.id !== id);
            }

            saveCart();
        }

        function removeItem(id) {
            cart = cart.filter(p => p.id !== id);
            saveCart();
        }

        function clearCart() {
            cart = [];
            saveCart();
        }

        function saveCart() {
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        renderCart();
    </script>

</body>
</html>
