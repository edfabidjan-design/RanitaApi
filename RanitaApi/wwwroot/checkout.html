<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ranita - Checkout</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <h1>Finaliser la commande</h1>

    <form id="checkoutForm">
        <input type="text" id="customerName" placeholder="Nom complet" required>
        <input type="tel" id="customerPhone" placeholder="Téléphone" required>
        <input type="text" id="customerAddress" placeholder="Adresse de livraison" required>

        <select id="paymentMethod" required>
            <option value="">Mode de paiement</option>
            <option value="Paiement à la livraison">Paiement à la livraison</option>
            <option value="Orange Money">Orange Money</option>
            <option value="Wave">Wave</option>
            <option value="MTN MoMo">MTN MoMo</option>
        </select>

        <h2 id="orderTotal">Total : 0 FCFA</h2>

        <button type="submit">Confirmer la commande</button>
    </form>

    <a href="cart.html">
        <button>Retour au panier</button>
    </a>

    <script>
        const API_BASE = "/api";
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const orderTotal = document.getElementById("orderTotal");
        const checkoutForm = document.getElementById("checkoutForm");

        function calculateTotal() {
            return cart.reduce((sum, item) => sum + Number(item.price) * Number(item.quantity), 0);
        }

        orderTotal.textContent = "Total : " + calculateTotal().toLocaleString() + " FCFA";

        checkoutForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            if (cart.length === 0) {
                alert("Votre panier est vide.");
                window.location.href = "products.html";
                return;
            }

            const order = {
                customerName: document.getElementById("customerName").value,
                customerPhone: document.getElementById("customerPhone").value,
                customerAddress: document.getElementById("customerAddress").value,
                paymentMethod: document.getElementById("paymentMethod").value,
                items: cart.map(item => ({
                    productId: item.id,
                    quantity: item.quantity
                }))
            };

            const res = await fetch(`${API_BASE}/orders`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(order)
            });

            if (!res.ok) {
                const err = await res.text();
                alert("Erreur commande : " + err);
                return;
            }

            localStorage.removeItem("cart");
            alert("Commande confirmée avec succès !");
            window.location.href = "products.html";
        });
    </script>
</body>
</html>
