<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita - Checkout</title>
    <link rel="stylesheet" href="products.css">
</head>
<body>

    <header class="site-header">
        <div class="site-logo" onclick="location.href='index.html'">🛒 Ranita Market</div>
        <nav>
            <a href="products.html">Produits</a>
            <a href="cart.html">Panier</a>
        </nav>
    </header>

    <main class="checkout-page">
        <section class="checkout-card">
            <h1>Finaliser la commande</h1>
            <p>Renseignez vos informations de livraison.</p>

            <form id="checkoutForm">
                <input type="text" id="customerName" placeholder="Nom complet" required>
                <input type="tel" id="customerPhone" placeholder="Téléphone" required>
                <input type="text" id="customerAddress" placeholder="Adresse de livraison" required>

                <select id="paymentMethod" required>
                    <option value="">Mode de paiement</option>
                    <option value="Paiement à la livraison">Paiement à la livraison</option>
                    <option value="Orange Money">Orange Money</option>
                    <option value="Wave">Wave</option>
                    <option value="MTN MoMo">MTN MoMo</option>
                </select>

                <h2 id="orderTotal">Total : 0 FCFA</h2>

                <button type="submit" class="btn-buy">Confirmer la commande</button>
            </form>

            <a href="cart.html" class="secondary-link">Retour au panier</a>
        </section>
    </main>

    <script>
        const API_BASE = "https://ranita-api.onrender.com/api";
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const orderTotal = document.getElementById("orderTotal");
        const checkoutForm = document.getElementById("checkoutForm");

        function calculateTotal() {
            return cart.reduce((sum, item) => sum + Number(item.price) * Number(item.quantity), 0);
        }

        orderTotal.textContent = "Total : " + calculateTotal().toLocaleString() + " FCFA";

        checkoutForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            if (cart.length === 0) {
                alert("Votre panier est vide.");
                window.location.href = "products.html";
                return;
            }

            const order = {
                clientId: JSON.parse(localStorage.getItem("client"))?.id || null,
                customerName: customerName.value,
                customerPhone: customerPhone.value,
                customerAddress: customerAddress.value,
                paymentMethod: paymentMethod.value,
                items: cart.map(item => ({
                    productId: item.id,
                    quantity: item.quantity
                }))
            };

            const res = await fetch(`${API_BASE}/orders`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(order)
            });

            if (!res.ok) {
                const err = await res.text();
                alert("Erreur commande : " + err);
                return;
            }

            const data = await res.json();
            localStorage.removeItem("cart");
            localStorage.setItem("lastOrderId", data.id);
            window.location.href = "thank-you.html";
        });
    </script>

</body>
</html>
