<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - Ranita</title>
    <link rel="stylesheet" href="auth.css">
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#10b981"></head>
<body>

    <div class="auth-card">

        <div class="auth-logo" onclick="location.href='index.html'">
            ?? Ranita Market
        </div>

        <h2>Connexion Admin</h2>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Connexion</button>

    </div>

    <script>
        const API = "https://ranitaapi-production.up.railway.app/api";

        async function login() {
            const res = await fetch(`${API}/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: username.value,
                    password: password.value
                })
            });

            if (!res.ok) {
                const err = await res.text();
                alert(err);
                return;
            }

            const data = await res.json();

            localStorage.setItem("adminToken", data.token);
            window.location.href = "admin-dashboard.html";
        }
    </script>

</body>
</html>
