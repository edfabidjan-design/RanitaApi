<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita - Produits</title>
    <link rel="stylesheet" href="products.css">
</head>
<body>

    <header class="mobile-shop-header">
        <div class="site-logo" onclick="window.location.href='index.html'">
            🛒 Ranita Market
        </div>

        <a href="cart.html" class="cart-link">
            🛒 Panier (<span id="cartCount">0</span>)
        </a>
    </header>

    <main class="products-page">

        <section class="products-title">
            <h1>Nos produits</h1>
            <p>Découvrez les articles disponibles sur Ranita Market</p>
        </section>

        <section class="products-toolbar">
            <input type="text" id="searchInput" placeholder="Rechercher un produit..." />

            <select id="categoryFilter">
                <option value="">Toutes les catégories</option>
            </select>
        </section>

        <div id="productsGrid"></div>

    </main>

    <script>
        const API_BASE = "https://ranita-api.onrender.com/api";

        const productsApi = `${API_BASE}/products`;
        const categoriesApi = `${API_BASE}/categories`;

        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let allProducts = [];

        const productsGrid = document.getElementById("productsGrid");
        const searchInput = document.getElementById("searchInput");
        const categoryFilter = document.getElementById("categoryFilter");

        async function loadCategories() {
            const res = await fetch(categoriesApi);
            const categories = await res.json();

            categories.forEach(c => {
                categoryFilter.innerHTML += `
                            <option value="${c.id}">${c.name}</option>
                        `;
            });
        }

        async function loadProducts() {
            const res = await fetch(productsApi);
            allProducts = await res.json();
            renderProducts();
        }

        function updateCartCount() {
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById("cartCount").textContent = total;
        }


        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);

            if (!product || product.stock <= 0) {
                alert("Produit en rupture de stock.");
                return;
            }

            const existing = cart.find(p => p.id === id);

            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Produit ajouté au panier !");

            updateCartCount();
        }

        function openProductDetails(id) {
            window.location.href = `product-details.html?id=${id}`;
        }

        function renderProducts() {
            const search = searchInput.value.toLowerCase();
            const selectedCategory = categoryFilter.value;

            const filtered = allProducts.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search);
                const matchCategory = !selectedCategory || String(p.categoryId) === selectedCategory;
                return matchSearch && matchCategory;
            });

            productsGrid.innerHTML = "";

            filtered.forEach(p => {
                productsGrid.innerHTML += `
        <div class="product-card" onclick="openProductDetails(${p.id})">
            <div class="product-img">
                <img src="${p.imageUrl ? p.imageUrl.replace('/upload/', '/upload/w_300,h_300,c_fill,q_auto,f_auto/') : 'https://via.placeholder.com/300x300?text=Ranita'}" alt="${p.name}">
            </div>

            <h3>${p.name}</h3>
            <p>${p.description || ""}</p>
            <strong>${Number(p.price).toLocaleString()} FCFA</strong>
            <small>${p.category?.name || ""}</small>
            <small>Stock : ${p.stock}</small>

            ${p.stock <= 0
                        ? `<button disabled class="btn-disabled" onclick="event.stopPropagation()">Rupture de stock</button>`
                        : `<button class="btn-buy" onclick="event.stopPropagation(); addToCart(${p.id})">Ajouter au panier</button>`
                    }
        </div>
`;
            });
        }

        searchInput.addEventListener("input", renderProducts);
        categoryFilter.addEventListener("change", renderProducts);

        loadCategories();
        loadProducts();
        updateCartCount();
    </script>
</body>
</html>
