<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita - Produits</title>
    <link rel="stylesheet" href="products.css">
    <link rel="stylesheet" href="header.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <style>
        :root {
            --green-10b: #10b981;
            --green-059: #059669;
            --lk: #fff;
            --lk2: #f9fafb;
            --lk3: #f3f4f6;
            --lk-border: #e5e7eb;
            --lk-text: #111827;
            --lk-text2: #6b7280;
            --lk-text3: #9ca3af;
            --amber: #F59E0B;
            --red: #EF4444;
            --r: 12px;
            --r-sm: 8px;
            --r-pill: 999px;
        }

        body {
            font-family: Arial,sans-serif;
            background: var(--lk2);
            color: var(--lk-text);
        }

        /* PAGE */
        .products-page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 92px 20px 60px;
        }

        .products-title {
            margin-bottom: 20px;
        }

            .products-title h1 {
                font-size: 28px;
                font-weight: 800;
                color: var(--lk-text);
                margin: 0 0 4px;
                display: flex;
                align-items: center;
                gap: 10px;
            }

        .title-accent {
            width: 4px;
            height: 24px;
            background: var(--green-10b);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .products-count {
            font-size: 14px;
            color: var(--lk-text2);
        }

        /* TOOLBAR */
        .products-toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: var(--lk);
            padding: 14px 16px;
            border-radius: var(--r);
            border: 1px solid var(--lk-border);
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

            .products-toolbar input {
                flex: 1;
                min-width: 180px;
                padding: 10px 14px;
                border: 1px solid var(--lk-border);
                border-radius: var(--r-sm);
                font-size: 14px;
                font-family: Arial,sans-serif;
                outline: none;
                transition: border-color .2s;
            }

                .products-toolbar input:focus {
                    border-color: var(--green-10b);
                }

            .products-toolbar select {
                padding: 10px 14px;
                border: 1px solid var(--lk-border);
                border-radius: var(--r-sm);
                font-size: 14px;
                font-family: Arial,sans-serif;
                background: var(--lk);
                outline: none;
                cursor: pointer;
                transition: border-color .2s;
            }

                .products-toolbar select:focus {
                    border-color: var(--green-10b);
                }

        /* GRILLE */
        #productsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        /* ══ CARTE — style identique homepage ══ */
        .product-card {
            background: var(--lk);
            border: 1px solid var(--lk-border);
            border-radius: var(--r);
            overflow: hidden;
            cursor: pointer;
            transition: all .25s;
            position: relative;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
        }

            .product-card:hover {
                border-color: var(--green-10b);
                transform: translateY(-4px);
                box-shadow: 0 8px 24px rgba(16,185,129,0.14);
            }

        /* Image */
        .product-img-list {
            height: 200px;
            width: 100%;
            overflow: hidden;
            background: var(--lk3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

            .product-img-list img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                padding: 8px;
                transition: transform .3s;
            }

        .product-card:hover .product-img-list img {
            transform: scale(1.04);
        }

        /* Badge */
        .discount-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--red);
            color: #fff;
            font-weight: 700;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: var(--r-pill);
            z-index: 2;
        }

        /* Info */
        .product-info {
            padding: 10px 12px 12px;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 3px;
        }

        .product-category {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--green-10b);
            font-weight: 700;
        }

        .product-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--lk-text);
            margin: 0;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Stars */
        .stars-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
        }

            .stars-row .s {
                color: var(--amber);
            }

            .stars-row .sc {
                color: var(--lk-text3);
            }

        /* Prix — style homepage : prix barré visible */
        .product-prices {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 2px;
        }

        .price-current {
            font-size: 15px;
            font-weight: 800;
            color: var(--green-10b);
            white-space: nowrap;
        }

        .price-old {
            font-size: 11px;
            color: var(--lk-text3);
            text-decoration: line-through;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .price-badge {
            font-size: 10px;
            background: #fef2f2;
            color: var(--red);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 700;
        }

        /* Stock */
        .product-stock {
            font-size: 11px;
            color: var(--lk-text3);
        }

            .product-stock.low {
                color: var(--amber);
                font-weight: 700;
            }

            .product-stock.out {
                color: var(--red);
                font-weight: 700;
            }

        /* Boutons — style homepage */
        .btn-buy {
            width: 100%;
            background: linear-gradient(135deg,var(--green-10b),var(--green-059));
            color: #fff;
            border: none;
            padding: 9px 10px;
            border-radius: var(--r-sm);
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            margin-top: auto;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: Arial,sans-serif;
        }

            .btn-buy:hover {
                opacity: .9;
                transform: translateY(-1px);
            }

        .btn-disabled {
            width: 100%;
            background: var(--lk3);
            color: var(--lk-text3);
            border: none;
            padding: 9px 10px;
            border-radius: var(--r-sm);
            font-weight: 700;
            font-size: 12px;
            cursor: not-allowed;
            margin-top: auto;
            font-family: Arial,sans-serif;
        }

        /* SKELETON */
        .skeleton {
            background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: var(--r-sm);
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .skel-card {
            background: var(--lk);
            border: 1px solid var(--lk-border);
            border-radius: var(--r);
            overflow: hidden;
        }

        .skel-img {
            height: 160px;
            border-radius: 0;
        }

        .skel-line {
            height: 11px;
            margin: 10px 12px 0;
        }

            .skel-line.sm {
                width: 55%;
            }

            .skel-line.lg {
                width: 80%;
            }

        .skel-btn {
            height: 32px;
            margin: 10px 12px 12px;
            border-radius: var(--r-sm);
        }

        /* VIDE */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--lk-text3);
        }

            .empty-state span {
                font-size: 40px;
                display: block;
                margin-bottom: 10px;
            }

            .empty-state p {
                font-size: 15px;
            }

        /* RESPONSIVE */
        @media(max-width:1024px) {
            #productsGrid {
                grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
                gap: 14px;
            }
        }

        @media(max-width:768px) {
            .products-toolbar {
                display: none !important;
            }

            .products-page {
                padding: 62px 8px 40px !important;
            }

            .products-title h1 {
                font-size: 20px !important;
            }

            #productsGrid {
                grid-template-columns: repeat(2,minmax(0,1fr)) !important;
                gap: 10px !important;
                align-items: stretch !important;
            }

            .product-card {
                padding: 0 !important;
                border-radius: 14px !important;
                display: flex !important;
                flex-direction: column !important;
                height: 100% !important;
            }

            .product-img-list {
                height: 160px !important;
                max-height: 160px !important;
                border-radius: 14px 14px 0 0 !important;
                flex-shrink: 0 !important;
            }

            .product-info {
                padding: 8px 10px 10px !important;
                gap: 3px !important;
                display: flex !important;
                flex-direction: column !important;
                flex: 1 !important;
            }

            .product-category {
                font-size: 9px !important;
            }

            .product-name {
                font-size: 13px !important;
                font-weight: 700 !important;
            }

            .stars-row {
                font-size: 11px !important;
            }

            .price-current {
                font-size: 14px !important;
                white-space: nowrap !important;
            }

            .price-old {
                font-size: 11px !important;
            }

            .product-stock {
                font-size: 11px !important;
            }

            .btn-buy, .btn-disabled {
                width: 100% !important;
                font-size: 12px !important;
                border-radius: 10px !important;
                padding: 9px 4px !important;
                margin-top: auto !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                box-sizing: border-box !important;
            }
        }

        @media(max-width:360px) {
            #productsGrid {
                grid-template-columns: 1fr;
            }

            .product-img-list {
                height: 180px;
            }

            .price-current {
                font-size: 15px;
            }

            .btn-buy, .btn-disabled {
                font-size: 13px;
                padding: 10px;
            }
        }
    </style>
</head>

    <script>
        const API_BASE = "https://ranitaapi-production.up.railway.app/api";
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let allProducts = [];
        let reviewsMap = {};
        const productsGrid = document.getElementById("productsGrid");
        const searchInput = document.getElementById("searchInput");
        const categoryFilter = document.getElementById("categoryFilter");
        const productsCount = document.getElementById("productsCount");

        async function loadReviews() {
            try {
                const res = await fetch(`${API_BASE}/reviews`);
                const reviews = await res.json();
                reviewsMap = {};
                reviews.forEach(r => {
                    if (!reviewsMap[r.productId]) reviewsMap[r.productId] = [];
                    reviewsMap[r.productId].push(r.note);
                });
            } catch (e) { }
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categories`);
                const categories = await res.json();
                categories.forEach(parent => {
                    if (parent.children && parent.children.length > 0) {
                        categoryFilter.innerHTML += `<optgroup label="📁 ${parent.name}">`;
                        parent.children.forEach(child => {
                            categoryFilter.innerHTML += `<option value="${child.id}">${child.name}</option>`;
                        });
                        categoryFilter.innerHTML += `</optgroup>`;
                    } else {
                        categoryFilter.innerHTML += `<option value="${parent.id}">📁 ${parent.name}</option>`;
                    }
                });
            } catch (e) { console.error("Erreur catégories", e); }
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_BASE}/products`);
                allProducts = await res.json();
                allProducts = allProducts.filter(p => p.isActive !== false);
                await loadReviews();
                renderProducts();
            } catch (e) {
                productsGrid.innerHTML = `<div class="empty-state"><span>😕</span><p>Impossible de charger les produits.</p></div>`;
            }
        }

        function updateCartCount() {
            const total = cart.reduce((sum, item) => sum + (item.quantity || item.qty || 1), 0);
            document.getElementById("cartCount").textContent = total;
            if (typeof updateCartBadge === 'function') updateCartBadge();
        }

        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product || product.stock <= 0) { alert("Produit en rupture de stock."); return; }
            const existing = cart.find(p => p.id === id);
            if (existing) { existing.quantity++; }
            else { cart.push({ ...product, quantity: 1 }); }
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartBadge();
            updateCartCount();
            const btn = document.querySelector(`[data-id="${id}"]`);
            if (btn) {
                const orig = btn.innerHTML;
                btn.innerHTML = "✅ Ajouté !";
                btn.style.background = "#059669";
                setTimeout(() => { btn.innerHTML = orig; btn.style.background = ""; }, 1200);
            }
        }

        function openProductDetails(id) { window.location.href = `product-details.html?id=${id}`; }
        function calcDiscount(price, oldPrice) { if (!oldPrice || oldPrice <= price) return null; return Math.round((1 - price / oldPrice) * 100); }

        function renderProducts() {
            const search = searchInput.value.toLowerCase();
            const selectedCategory = categoryFilter.value;
            const filtered = allProducts.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search) || (p.shortDescription || "").toLowerCase().includes(search);
                const matchCategory = !selectedCategory || String(p.categoryId) === selectedCategory;
                return matchSearch && matchCategory;
            });

            productsCount.textContent = `${filtered.length} produit${filtered.length !== 1 ? 's' : ''} trouvé${filtered.length !== 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                productsGrid.innerHTML = `<div class="empty-state"><span>🔍</span><p>Aucun produit trouvé.</p></div>`;
                return;
            }

            productsGrid.innerHTML = filtered.map(p => {
                const imgUrl = p.imageUrl ? p.imageUrl.replace('/upload/', '/upload/w_400,h_400,c_fill,q_auto,f_auto/') : '';
                const discount = calcDiscount(p.price, p.oldPrice);

                let stockHtml = '';
                if (p.stock === 0) stockHtml = `<span class="product-stock out">Rupture de stock</span>`;
                else if (p.stock <= 5) stockHtml = `<span class="product-stock low">⚠ Plus que ${p.stock} en stock</span>`;
                else stockHtml = `<span class="product-stock">Stock : ${p.stock}</span>`;

                const notes = reviewsMap[p.id];
                let starsHtml = '';
                if (notes && notes.length > 0) {
                    const avg = (notes.reduce((s, n) => s + n, 0) / notes.length).toFixed(1);
                    const full = Math.round(avg);
                    starsHtml = `<div class="stars-row"><span class="s">${'★'.repeat(full)}${'☆'.repeat(5 - full)}</span><span class="sc">${avg} (${notes.length})</span></div>`;
                }

                let btnHtml = '';
                if (p.stock <= 0) {
                    btnHtml = `<button class="btn-disabled" disabled onclick="event.stopPropagation()">Rupture de stock</button>`;
                } else if (p.variants && p.variants.length > 0) {
                    btnHtml = `<button class="btn-buy" onclick="event.stopPropagation();location.href='product-details.html?id=${p.id}'">👁 Choisir une variante</button>`;
                } else {
                    btnHtml = `<button class="btn-buy" data-id="${p.id}" onclick="event.stopPropagation();addToCart(${p.id})">🛒 Ajouter au panier</button>`;
                }

                /* Prix barré — flex-shrink:0 pour ne pas couper */
                const oldPriceHtml = p.oldPrice && p.oldPrice > p.price
                    ? `<span class="price-old">${Number(p.oldPrice).toLocaleString('fr-FR')} F</span>`
                    : '';

                return `
                                <div class="product-card" onclick="openProductDetails(${p.id})">
                                  <div class="product-img-list">
                                    ${imgUrl ? `<img src="${imgUrl}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">` : `<span style="font-size:48px">🛍️</span>`}
                                    ${discount ? `<span class="discount-badge">-${discount}%</span>` : ''}
                                  </div>
                                  <div class="product-info">
                                    <span class="product-category">${p.category?.name || ''}</span>
                                    <h3 class="product-name">${p.name}</h3>
                                    ${starsHtml}
                                    <div class="product-prices">
                                      <span class="price-current">${Number(p.price).toLocaleString('fr-FR')} FCFA</span>
                                      ${oldPriceHtml}
                                      ${discount ? `<span class="price-badge">-${discount}%</span>` : ''}
                                    </div>
                                    ${stockHtml}
                                    ${btnHtml}
                                  </div>
                                </div>`;
            }).join('');
        }

        searchInput.addEventListener("input", renderProducts);
        categoryFilter.addEventListener("change", renderProducts);
        loadCategories();
        loadProducts();
        updateCartCount();
    </script>

    <!-- ── TOAST CRÉDIT PARRAINAGE ── -->

            color:white;width:24px;height:24px;border-radius:50%;
            cursor:pointer;font-size:14px;display:flex;
            align-items:center;justify-content:center;">
            ×

            🎁 Crédit parrainage disponible

        <div style="font-size:22px;font-weight:800;margin-bottom:4px;" id="toastCreditAmount">

        <div style="font-size:12px;opacity:.85;margin-bottom:14px;line-height:1.4;">
            Sera déduit automatiquement de votre prochaine commande !
        </div>
        <a href="cart.html" style="
            display:inline-block;background:white;color:#059669;
            padding:9px 18px;border-radius:8px;font-weight:700;
            font-size:13px;text-decoration:none;">
            🛒 Commander maintenant →
        </a>
    </div>

    <script>
        (function () {
            var client = JSON.parse(localStorage.getItem('client') || 'null');
            if (!client) return;
            fetch('/api/client-auth/referral/' + client.id)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!data.referralCredits || data.referralCredits <= 0) return;
                    var el = document.getElementById('toastCreditAmount');
                    if (el) el.textContent = Number(data.referralCredits).toLocaleString('fr-FR') + ' F CFA';
                    setTimeout(function () {
                        var toast = document.getElementById('referralToast');
                        if (toast) toast.style.right = '20px';
                        setTimeout(function () { closeReferralToast(); }, 60000);
                    }, 3000);
                })
                .catch(function () { });
        })();

        function closeReferralToast() {
            var toast = document.getElementById('referralToast');
            if (toast) toast.style.right = '-340px';
        }
    </script>

</body>
</html>
