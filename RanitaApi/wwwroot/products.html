<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranita - Produits</title>
    <link rel="stylesheet" href="products.css">
    <style>
        .products-toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

            .products-toolbar input {
                flex: 1;
                min-width: 200px;
                padding: 10px 16px;
                border: 1px solid #e5e7eb;
                border-radius: 10px;
                font-size: 14px;
            }

            .products-toolbar select {
                padding: 10px 16px;
                border: 1px solid #e5e7eb;
                border-radius: 10px;
                font-size: 14px;
                background: white;
            }

        #productsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

            .product-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            }

        .product-img {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background: #f9fafb;
        }

            .product-img img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.3s;
            }

        .product-card:hover .product-img img {
            transform: scale(1.04);
        }

        .product-info {
            padding: 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .product-category {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #10b981;
            font-weight: 600;
        }

        .product-name {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
            line-height: 1.4;
            margin: 0;
        }

        .product-description {
            font-size: 12px;
            color: #6b7280;
            margin: 0;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-prices {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .price-current {
            font-size: 16px;
            font-weight: 800;
            color: #111827;
        }

        .price-old {
            font-size: 12px;
            color: #9ca3af;
            text-decoration: line-through;
        }

        .price-badge {
            font-size: 11px;
            background: #fef2f2;
            color: #ef4444;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 700;
        }

        .product-stock {
            font-size: 12px;
            color: #9ca3af;
        }

            .product-stock.low {
                color: #f59e0b;
                font-weight: 600;
            }

        .btn-buy {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            margin-top: auto;
            transition: background 0.2s;
        }

            .btn-buy:hover {
                background: #059669;
            }

        .btn-disabled {
            width: 100%;
            background: #f3f4f6;
            color: #9ca3af;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: not-allowed;
            margin-top: auto;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

            .empty-state p {
                font-size: 16px;
                margin-top: 8px;
            }

        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header class="mobile-shop-header">
        <div class="site-logo" onclick="window.location.href='index.html'">
            🛒 Ranita Market
        </div>
        <a href="cart.html" class="cart-link">
            🛒 Panier (<span id="cartCount">0</span>)
        </a>
    </header>

    <main class="products-page">

        <section class="products-title">
            <h1>Nos produits</h1>
            <p>Découvrez les articles disponibles sur Ranita Market</p>
        </section>

        <section class="products-toolbar">
            <input type="text" id="searchInput" placeholder="🔍 Rechercher un produit..." />
            <select id="categoryFilter">
                <option value="">Toutes les catégories</option>
            </select>
        </section>

        <div id="productsGrid">
            <div class="loading-state">Chargement des produits...</div>
        </div>

    </main>

    <script>
        const API_BASE = "https://ranitaapi-production.up.railway.app/api";
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let allProducts = [];

        const productsGrid = document.getElementById("productsGrid");
        const searchInput = document.getElementById("searchInput");
        const categoryFilter = document.getElementById("categoryFilter");

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categories`);
                const categories = await res.json();
                categories.forEach(parent => {
                    if (parent.children && parent.children.length > 0) {
                        categoryFilter.innerHTML += `<optgroup label="📁 ${parent.name}">`;
                        parent.children.forEach(child => {
                            categoryFilter.innerHTML += `<option value="${child.id}">${child.name}</option>`;
                        });
                        categoryFilter.innerHTML += `</optgroup>`;
                    } else {
                        categoryFilter.innerHTML += `<option value="${parent.id}">📁 ${parent.name}</option>`;
                    }
                });
            } catch (e) {
                console.error("Erreur chargement catégories", e);
            }
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_BASE}/products`);
                allProducts = await res.json();
                // Filtrer seulement les produits actifs
                allProducts = allProducts.filter(p => p.isActive !== false);
                renderProducts();
            } catch (e) {
                productsGrid.innerHTML = `<div class="empty-state"><span style="font-size:40px">😕</span><p>Impossible de charger les produits. Réessayez plus tard.</p></div>`;
            }
        }

        function updateCartCount() {
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById("cartCount").textContent = total;
        }

        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product || product.stock <= 0) {
                alert("Produit en rupture de stock.");
                return;
            }
            const existing = cart.find(p => p.id === id);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartCount();

            // Feedback visuel
            const btn = document.querySelector(`[data-id="${id}"]`);
            if (btn) {
                const orig = btn.textContent;
                btn.textContent = "✅ Ajouté !";
                btn.style.background = "#059669";
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.style.background = "";
                }, 1200);
            }
        }

        function openProductDetails(id) {
            window.location.href = `product-details.html?id=${id}`;
        }

        function calcDiscount(price, oldPrice) {
            if (!oldPrice || oldPrice <= price) return null;
            return Math.round((1 - price / oldPrice) * 100);
        }

        function renderProducts() {
            const search = searchInput.value.toLowerCase();
            const selectedCategory = categoryFilter.value;

            const filtered = allProducts.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search) ||
                    (p.shortDescription || "").toLowerCase().includes(search);
                const matchCategory = !selectedCategory || String(p.categoryId) === selectedCategory;
                return matchSearch && matchCategory;
            });

            if (filtered.length === 0) {
                productsGrid.innerHTML = `<div class="empty-state"><span style="font-size:40px">🔍</span><p>Aucun produit trouvé pour cette recherche.</p></div>`;
                return;
            }

            productsGrid.innerHTML = filtered.map(p => {
                const imgUrl = p.imageUrl
                    ? p.imageUrl.replace('/upload/', '/upload/w_400,h_400,c_fill,q_auto,f_auto/')
                    : 'https://via.placeholder.com/400x400?text=Ranita';

                const discount = calcDiscount(p.price, p.oldPrice);
                const stockLabel = p.stock === 0
                    ? ''
                    : p.stock <= 5
                        ? `<span class="product-stock low">⚠️ Plus que ${p.stock} en stock</span>`
                        : `<span class="product-stock">Stock : ${p.stock}</span>`;

                return `
                    <div class="product-card" onclick="openProductDetails(${p.id})">
                        <div class="product-img">
                            <img src="${imgUrl}" alt="${p.name}" loading="lazy">
                        </div>
                        <div class="product-info">
                            <span class="product-category">${p.category?.name || ""}</span>
                            <h3 class="product-name">${p.name}</h3>
                            
                            <div class="product-prices">
                                <span class="price-current">${Number(p.price).toLocaleString()} FCFA</span>
                                ${p.oldPrice ? `<span class="price-old">${Number(p.oldPrice).toLocaleString()} FCFA</span>` : ""}
                                ${discount ? `<span class="price-badge">-${discount}%</span>` : ""}
                            </div>
                            ${stockLabel}
                            ${p.stock <= 0
                        ? `<button class="btn-disabled" disabled onclick="event.stopPropagation()">Rupture de stock</button>`
                    : p.variants && p.variants.length > 0
                        ? `<button class="btn-buy" onclick="event.stopPropagation(); location.href='product-details.html?id=${p.id}'">👁 Choisir une variante</button>`
                        : `<button class="btn-buy" data-id="${p.id}" onclick="event.stopPropagation(); addToCart(${p.id})">🛒 Ajouter au panier</button>`
                    }
                        </div>
                    </div>`;
            }).join('');
        }

        searchInput.addEventListener("input", renderProducts);
        categoryFilter.addEventListener("change", renderProducts);

        loadCategories();
        loadProducts();
        updateCartCount();
    </script>
</body>
</html>
