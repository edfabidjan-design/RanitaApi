<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser mot de passe - Ranita</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-card">

        <div class="auth-logo" onclick="location.href='index.html'">
            🛒 Ranita Market
        </div>

        <h2>Réinitialiser le mot de passe</h2>

        <form id="resetForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="code" placeholder="Code reçu" required>
            <input type="password" id="password" placeholder="Nouveau mot de passe" required>

            <button type="submit">Réinitialiser</button>
        </form>

        <div class="auth-links">
            <a href="forgot-password.html">Renvoyer un code</a><br>
            <a href="login.html">Retour à la connexion</a>
        </div>

    </div>

    <script>
        const API = "https://ranita-api.onrender.com/api/client-auth";
        const resetForm = document.getElementById("resetForm");

        resetForm.addEventListener("submit", async e => {
            e.preventDefault();

            const btn = resetForm.querySelector("button");
            btn.disabled = true;
            btn.textContent = "Traitement...";

            if (password.value.length < 6) {
                alert("Mot de passe trop court (min 6 caractères)");
                btn.disabled = false;
                btn.textContent = "Réinitialiser";
                return;
            }

            if (!email.value || !code.value) {
                alert("Veuillez remplir tous les champs");
                btn.disabled = false;
                btn.textContent = "Réinitialiser";
                return;
            }

            const res = await fetch(`${API}/reset-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: email.value.trim(),
                    code: code.value.trim(),
                    newPassword: password.value.trim()
                })
            });

            const text = await res.text();

            if (!res.ok) {
                alert(text);
                btn.disabled = false;
                btn.textContent = "Réinitialiser";
                return;
            }

            alert("✅ Mot de passe modifié avec succès !");
            window.location.href = "login.html";
        });
    </script>

</body>
</html>
