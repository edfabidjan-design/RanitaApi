<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Vendeur - Ranita Market</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
</head>
<body>

    <div class="auth-card">
        <div class="auth-logo" onclick="location.href='index.html'">
            🛒 Ranita Market
        </div>

        <h2>Espace Vendeur</h2>
        <p style="text-align:center;color:#6b7280;font-size:13px;margin-bottom:20px;">
            Connectez-vous pour accéder à votre boutique
        </p>

        <div id="errorMsg" style="display:none;background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;"></div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>

            <!-- Après -->
            <div style="position:relative;">
                <input type="password" id="password" placeholder="Mot de passe" required style="width:100%;padding-right:44px;">
                <span onclick="togglePwd()" id="eyeBtn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;color:#6b7280;user-select:none;z-index:1;">👁</span>
            </div>

            <button type="submit" id="btn-login">Se connecter →</button>
        </form>

        <div class="auth-links" style="margin-top:20px;">
            <a href="index.html">← Accueil</a><br>
            <a href="forgot-password.html" style="margin-top:8px;display:inline-block;">Mot de passe oublié ?</a>
        </div>

        <div style="margin-top:24px;padding-top:16px;border-top:1px solid #e5e7eb;text-align:center;">
            <p style="font-size:13px;color:#6b7280;">Pas encore vendeur ?</p>
            <a href="register.html?redirect=vendeur.html" style="display:inline-block;margin-top:8px;background:#f0fdf4;color:#059669;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;border:1px solid #d1fae5;">
                Créer ma boutique →
            </a>
        </div>
    </div>

    <script>
        const API = 'https://ranitaapi-production.up.railway.app/api';

        // Si déjà connecté comme vendeur, rediriger
        const seller = JSON.parse(localStorage.getItem('seller')) || null;
        if (seller) window.location.href = 'vendeur.html';

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function togglePwd() {
            const pwd = document.getElementById('password');
            const btn = document.getElementById('eyeBtn');
            if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = '🙈'; }
            else { pwd.type = 'password'; btn.textContent = '👁'; }
        }
        async function registerSellerPush(sellerId) {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
            try {
                const reg = await navigator.serviceWorker.register('/sw-client.js');

                if (Notification.permission === 'default') {
                    const permission = await Notification.requestPermission();
                    if (permission !== 'granted') return;
                }
                if (Notification.permission !== 'granted') return;

                // Forcer re-enregistrement
                const existing = await reg.pushManager.getSubscription();
                if (existing) await existing.unsubscribe();

                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: 'BK0OMo2QWE4SuKh0RTa6yvHfpkBXcPzL5sZkaJe3nNLesXQjRDhMzyimA8UNBCGvB9AOYpv_Q0RQrmgmA9YdNdY'
                });

                await fetch(`${API}/sellers/push-subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sellerId: sellerId,
                        endpoint: sub.endpoint,
                        p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('p256dh')))),
                        auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('auth'))))
                    })
                });
                console.log('Push vendeur enregistré !');
            } catch (e) {
                console.error('Push vendeur error:', e);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const modal = document.getElementById('loadingModal');
            const msg = document.getElementById('loadingMsg');

            btn.disabled = true;
            modal.style.display = 'flex';
            msg.textContent = 'Vérification de vos identifiants...';
            document.getElementById('errorMsg').style.display = 'none';

            try {
                const res = await fetch(`${API}/sellers/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    modal.style.display = 'none';
                    showError(data.message || 'Erreur de connexion');
                    btn.disabled = false;
                    btn.textContent = 'Se connecter →';
                    return;
                }

                msg.textContent = 'Connexion réussie ! Redirection...';
                localStorage.setItem('sellerToken', data.token);
                localStorage.setItem('seller', JSON.stringify({
                    clientId: data.clientId,
                    sellerId: data.sellerId,
                    shopName: data.shopName,
                    status: data.status,
                    name: data.name,
                    email: data.email
                }));
                await registerSellerPush(data.sellerId);

                setTimeout(function () {
                    window.location.href = 'vendeur.html';
                }, 800);

            } catch (e) {
                modal.style.display = 'none';
                showError('Erreur réseau — réessayez');
                btn.disabled = false;
                btn.textContent = 'Se connecter →';
            }
        });
    </script>


    <!-- Modal chargement -->
    <div id="loadingModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
        <div style="background:white;border-radius:20px;padding:40px 32px;text-align:center;max-width:280px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);">
            <div style="font-size:42px;margin-bottom:16px;">🏪</div>
            <div style="font-size:16px;font-weight:700;color:#111827;margin-bottom:8px;">Connexion en cours...</div>
            <div style="font-size:13px;color:#6b7280;margin-bottom:20px;" id="loadingMsg">Vérification de vos identifiants</div>
            <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;"></div>
        </div>
    </div>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>


</body>
</html>
