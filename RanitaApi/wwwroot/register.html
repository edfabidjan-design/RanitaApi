<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Ranita Market</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <style>
        .referral-badge {
            background: #f0fdf4;
            border: 1px solid #a7f3d0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #065f46;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

            .referral-badge.show {
                display: flex;
            }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-logo" onclick="location.href='index.html'">🛒 Ranita Market</div>
        <h2>Créer un compte</h2>

        <!-- Badge parrainage si ?ref= présent -->
        <div class="referral-badge" id="referralBadge">
            🎁 <span id="referralBadgeText"></span>
        </div>

        <form id="registerForm">
            <input type="text" id="name" placeholder="Nom complet" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="phone" placeholder="Téléphone">
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Créer mon compte</button>
        </form>

        <div class="auth-links">
            <a id="loginLink" href="login.html">Déjà un compte ? Se connecter</a>
            <script>
                const ref = new URLSearchParams(window.location.search).get('ref');
                if (ref) document.getElementById('loginLink').href = 'login.html?ref=' + ref;
            </script>
        </div>
    </div>

    <script>
        const API = "/api/client-auth";

        // Lire le code parrainage depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');

        if (refCode) {
            const badge = document.getElementById('referralBadge');
            document.getElementById('referralBadgeText').textContent =
                'Vous avez été invité avec le code ' + refCode + ' — votre ami recevra 2 500 F à votre premier achat !';
            badge.classList.add('show');
        }

        document.getElementById("registerForm").addEventListener("submit", async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const modal = document.getElementById('loadingModal');
            const msg = document.getElementById('loadingMsg');

            btn.disabled = true;
            modal.style.display = 'flex';
            msg.textContent = 'Enregistrement de vos informations...';

            try {
                const res = await fetch(`${API}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        FullName: document.getElementById("name").value.trim(),
                        Email: document.getElementById("email").value.trim(),
                        Phone: document.getElementById("phone").value.trim(),
                        Password: document.getElementById("password").value.trim(),
                        ReferralCode: refCode || ""
                    })
                });

                const text = await res.text();

                if (!res.ok) {
                    modal.style.display = 'none';
                    alert(text);
                    btn.disabled = false;
                    btn.textContent = 'Créer mon compte';
                    return;
                }

                msg.textContent = 'Compte créé ! Redirection...';

                const redirect = urlParams.get("redirect");
                let loginUrl = "login.html";
                const params = [];
                if (refCode) params.push("ref=" + refCode);
                if (redirect) params.push("redirect=" + redirect);
                if (params.length) loginUrl += "?" + params.join("&");

                setTimeout(function () {
                    window.location.href = loginUrl;
                }, 1000);

            } catch (e) {
                modal.style.display = 'none';
                alert('Erreur réseau : ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Créer mon compte';
            }
        });
    </script>


    <!-- Modal chargement -->
    <div id="loadingModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
        <div style="background:white;border-radius:20px;padding:40px 32px;text-align:center;max-width:280px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);">
            <div style="font-size:42px;margin-bottom:16px;">🛒</div>
            <div style="font-size:16px;font-weight:700;color:#111827;margin-bottom:8px;">Création du compte...</div>
            <div style="font-size:13px;color:#6b7280;margin-bottom:20px;" id="loadingMsg">Enregistrement de vos informations</div>
            <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;"></div>
        </div>
    </div>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>


</body>
</html>
