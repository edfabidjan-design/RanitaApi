<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-card">

        <div class="auth-logo" onclick="location.href='index.html'">
            🛒 Ranita Market
        </div>

        <h2>Créer un compte</h2>

        <form id="registerForm">
            <input type="text" id="name" placeholder="Nom complet" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="phone" placeholder="Téléphone">
            <input type="password" id="password" placeholder="Mot de passe" required>

            <button type="submit">Créer mon compte</button>
        </form>

        <div class="auth-links">
            <a href="login.html">Déjà un compte ? Se connecter</a>
        </div>

    </div>

    <script>
        const API = "https://ranita-api.onrender.com/api/client-auth";

        const registerForm = document.getElementById("registerForm");
        const nameInput = document.getElementById("name");
        const emailInput = document.getElementById("email");
        const phoneInput = document.getElementById("phone");
        const passwordInput = document.getElementById("password");

        registerForm.addEventListener("submit", async e => {
            e.preventDefault();

            const res = await fetch(`${API}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    FullName: nameInput.value.trim(),
                    Email: emailInput.value.trim(),
                    Phone: phoneInput.value.trim(),
                    Password: passwordInput.value.trim()
                })
            });

            const text = await res.text();

            if (!res.ok) {
                alert(text);
                return;
            }

            alert("Compte créé !");
            window.location.href = "login.html";
        });
    </script>

</body>
</html>
